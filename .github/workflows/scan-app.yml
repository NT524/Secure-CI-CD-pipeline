name: Application Security Scanning

on:
  workflow_call:
    

jobs:
  secret-scan:
    name: TruffleHog (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Scan (JSON Output)
        run: |
          docker run --rm -v "$PWD:/pwd" trufflesecurity/trufflehog:latest filesystem /pwd --json > trufflehog-report.json 

      - name: Upload TruffleHog Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trufflehog-secret-reports
          path: |
            trufflehog-report.json

      - name: Push TruffleHog Metrics to Grafana Prometheus
        if: always()
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          if [ -s "trufflehog-report.json" ]; then
            # Đếm số lượng lỗ hổng/secrets tìm thấy từ file json (mỗi object là 1 secret)
            NUM_SECRETS=$(jq -s 'length' trufflehog-report.json)
          else
            NUM_SECRETS=0
          fi

          # Định dạng Influx Line Protocol (Lưu ý: Không được cách dấu phẩy ở phần nhãn)
          PAYLOAD="security_scan,repo=${REPO},branch=${BRANCH},scan_type=secret-scan secrets_count=${NUM_SECRETS}"

          echo "Đang đẩy metric lên Grafana Prometheus: $PAYLOAD"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROMETHEUS_AUTH }}" \
            -H "Content-Type: text/plain" \
            "https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/v1/push/influx/write" \
            -d "$PAYLOAD"
