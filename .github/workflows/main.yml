name: DevSecOps Integrated Pipeline

# 1. CẤU HÌNH TRIGGER: Khi nào thì pipeline này được chạy?
on:
  push:
    branches:
      - feature/*
      - bugfix/*
      - dev

  pull_request:
    branches:
      - prod

  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  issues: write
