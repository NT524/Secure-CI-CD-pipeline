    with:
      ENVIRONMENT: prod
      AWS_REGION: us-east-1
    secrets: inherit

  Deploy-Policy-Gate:
    needs: [Provision-prod]
    uses: ./.github/workflows/policy_gate.yml
    with:
      ENVIRONMENT: prod
      AWS_REGION: us-east-1
      CLUSTER_NAME: ${{needs.Provision-prod.outputs.CLUSTER_NAME}}
