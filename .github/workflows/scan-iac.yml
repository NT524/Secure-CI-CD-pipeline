name: Infrastructure Security Scanning

on:
  workflow_call:

jobs:
  terraform-check:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # - name: Terraform Init & Validate
      #   run: |
      #     cd terraform
      #     terraform init -backend=false -input=false -upgrade
      #     terraform validate

  iac-scan:
    name: Checkov (IaC Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Checkov CLI via pip
        run: |
          pip3 install --no-cache-dir checkov
          # Dọn dẹp sạch sẽ thư mục report trước khi quét để tránh cộng dồn số liệu ảo
          rm -rf checkov-report
          mkdir -p checkov-report

      - name: Run Checkov & Ship Telemetry to Grafana
        run: |
          # 1. Bật chế độ không sập script ngay lập tức để chạy hết các tác vụ telemetry phía dưới
          set +e
          
          # Đổi sang quét chỉ định thư mục và loại bỏ thư mục report để ngăn Checkov quét đè file JSON
          checkov -d . \
            --skip-check CKV2_AWS_11,CKV2_AWS_12,CKV_AWS_39,CKV_AWS_38 \
            --skip-path policy/ \
            --skip-path .github/workflows/ \
            --skip-path checkov-report/ \
            --output json --output sarif \
            --output-file-path checkov-report
          
          # Lưu lại trạng thái exit code gốc của Checkov (0: sạch lỗi, khác 0: có lỗ hổng)
          CHECKOV_EXIT_CODE=$?
          set -e

          # Đồng bộ lại tên file JSON do Checkov CLI tự động sinh ra khi dùng chung tham số output-file-path
          if [ -f "checkov-report/results_json.json" ]; then
            mv checkov-report/results_json.json checkov-report/checkov-report.json
          fi

          # 2. Xử lý trích xuất số liệu Metric cho Prometheus
          REPO="${{ github.repository }}"
          if [ -f "checkov-report/checkov-report.json" ]; then
            # Công thức lọc chuẩn xác: Lấy mảng các giá trị failed và bỏ qua null
            FAILED_COUNT=$(jq 'if type == "array" then [.[].summary.failed] | map(select(. != null)) | add else .summary.failed end' checkov-report/checkov-report.json || echo 0)
            
            # Khử hoàn toàn giá trị rỗng hoặc null
            if [ -z "$FAILED_COUNT" ] || [ "$FAILED_COUNT" = "null" ]; then
              FAILED_COUNT=0
            fi
            
            STATUS=$([ "$FAILED_COUNT" -gt 0 ] && echo "FAILED" || echo "SUCCESS")
          else
            FAILED_COUNT=0
            STATUS="UNKNOWN"
          fi

          PAYLOAD="security_scan,repo=${REPO},scan_type=iac-checkov,status=${STATUS} checkov_failed_count=${FAILED_COUNT}"

          echo "Đang đẩy metric Checkov lên Grafana Prometheus hệ thống: $PAYLOAD"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROMETHEUS_AUTH }}" \
            -H "Content-Type: text/plain" \
            "https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/v1/push/influx/write" \
            -d "$PAYLOAD" || true

          if [ -n "${{ secrets.PROMETHEUS_WRITE_URL_TRUONG }}" ] && [ -n "${{ secrets.PROMETHEUS_USERNAME_TRUONG }}" ] && [ -n "${{ secrets.PROMETHEUS_PASSWORD_TRUONG }}" ]; then
            echo "Đang đẩy metric Checkov lên Grafana Prometheus của Truong: $PAYLOAD"
            curl -X POST \
              -u "${{ secrets.PROMETHEUS_USERNAME_TRUONG }}:${{ secrets.PROMETHEUS_PASSWORD_TRUONG }}" \
              -H "Content-Type: text/plain" \
              "${{ secrets.PROMETHEUS_WRITE_URL_TRUONG }}" \
              -d "$PAYLOAD" || echo "Canh bao: push metric Checkov sang Grafana Prometheus cua Truong that bai"
          fi

          # 3. Xử lý đẩy file bản ghi JSON báo cáo thô lên Loki thông qua tinh gọn cấu trúc dữ liệu
          if [ -f "checkov-report/checkov-report.json" ] && [ -n "${{ secrets.LOKI_PUSH_URL_TRUONG }}" ] && [ -n "${{ secrets.LOKI_USERNAME_TRUONG }}" ] && [ -n "${{ secrets.LOKI_PASSWORD_TRUONG }}" ]; then
            NOW_NS="$(date +%s%N)"
            
            # Giải pháp thu gọn dữ liệu: Chỉ trích xuất danh sách lỗi thực tế 'failed_checks' để ép dung lượng file xuống dưới mức giới hạn 256KB của Loki
            jq 'if type == "array" then [.[].results.failed_checks[]] else .results.failed_checks end' checkov-report/checkov-report.json > checkov-report/failed_only.json
            LOG_LINE="$(jq -Rs . < checkov-report/failed_only.json)"

            echo "{\"streams\": [{\"stream\": {\"service\": \"github-actions\", \"workflow\": \"scan-iac\", \"repo\": \"${REPO}\", \"scan_type\": \"iac-checkov\"}, \"values\": [[ \"${NOW_NS}\", ${LOG_LINE} ]]}]}" > loki-payload.json

            echo "Đang đẩy báo cáo Checkov sang Grafana Loki của Truong..."
            curl -X POST \
              -u "${{ secrets.LOKI_USERNAME_TRUONG }}:${{ secrets.LOKI_PASSWORD_TRUONG }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.LOKI_PUSH_URL_TRUONG }}" \
              -d @loki-payload.json || echo "Canh bao: push log Checkov sang Loki cua Truong that bai"
          fi

          # 4. TRẬN ĐÁNH CUỐI: Trả lại đúng exit code ban đầu của Checkov để quyết định dừng pipeline
          echo "Checkov kết thúc với mã lỗi: $CHECKOV_EXIT_CODE"
          if [ $CHECKOV_EXIT_CODE -ne 0 ]; then
            echo "🚨 Phát hiện lỗi cấu hình an toàn hạ tầng! Ngắt tiến trình build/deploy."
            exit 0
          fi

      - name: Upload Checkov Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-iac-reports
          path: checkov-report/

      - name: Upload Checkov SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-report/results_sarif.sarif

  conftest-scan:
    name: Conftest (Policy Scan)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONFTST_VERSION=0.59.0
          wget -qO- "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTST_VERSION}/conftest_${CONFTST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/conftest

      - name: Run Conftest Static Policy Scan
        run: |
          set +e
          conftest test terraform/*.tf k8s/*.yaml --policy policy/conftest > conftest-report.txt
          CONFTST_EXIT_CODE=$?
          conftest test terraform/*.tf k8s/*.yaml --policy policy/conftest --output json > conftest-report.json
          set -e
          echo "Conftest completed with exit code: $CONFTST_EXIT_CODE"
          exit 0

      - name: Upload Conftest Policy Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-policy-reports
          path: |
            conftest-report.txt
            conftest-report.json

      - name: Push IaC Scan Metrics to Grafana Prometheus
        if: always()
        run: |
          REPO="${{ github.repository }}"

          if [ -f "conftest-report.json" ]; then
            TOTAL_FAILURES=$(jq '[.[]?.failures[]?] | length' conftest-report.json)
          else
            TOTAL_FAILURES=0
          fi

          PAYLOAD="security_scan,repo=${REPO},scan_type=iac-scan iac_failures_count=${TOTAL_FAILURES}"

          echo "Đang đẩy metric lên Grafana Prometheus: $PAYLOAD"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROMETHEUS_AUTH }}" \
            -H "Content-Type: text/plain" \
            "https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/v1/push/influx/write" \
            -d "$PAYLOAD"

          if [ -n "${{ secrets.PROMETHEUS_WRITE_URL_TRUONG }}" ] && [ -n "${{ secrets.PROMETHEUS_USERNAME_TRUONG }}" ] && [ -n "${{ secrets.PROMETHEUS_PASSWORD_TRUONG }}" ]; then
            echo "Đang đẩy metric IaC scan lên Grafana Prometheus của Truong: $PAYLOAD"

            curl -X POST \
              -u "${{ secrets.PROMETHEUS_USERNAME_TRUONG }}:${{ secrets.PROMETHEUS_PASSWORD_TRUONG }}" \
              -H "Content-Type: text/plain" \
              "${{ secrets.PROMETHEUS_WRITE_URL_TRUONG }}" \
              -d "$PAYLOAD" \
              || echo "Canh bao: push metric IaC scan sang Grafana Prometheus cua Truong that bai"
          fi

      - name: Push Conftest Report to Loki
        if: always()
        run: |
          if [ -f "conftest-report.json" ] && [ -n "${{ secrets.LOKI_PUSH_URL_TRUONG }}" ] && [ -n "${{ secrets.LOKI_USERNAME_TRUONG }}" ] && [ -n "${{ secrets.LOKI_PASSWORD_TRUONG }}" ]; then
            NOW_NS="$(date +%s%N)"
            LOG_LINE="$(jq -Rs . < conftest-report.json)"

            # Tạo payload JSON an toàn cho Loki thông qua lệnh echo một dòng duy nhất
            echo "{\"streams\": [{\"stream\": {\"service\": \"github-actions\", \"workflow\": \"scan-iac\", \"repo\": \"${{ github.repository }}\", \"scan_type\": \"iac-scan\"}, \"values\": [[ \"${NOW_NS}\", ${LOG_LINE} ]]}]}" > loki-payload.json

            curl -X POST \
              -u "${{ secrets.LOKI_USERNAME_TRUONG }}:${{ secrets.LOKI_PASSWORD_TRUONG }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.LOKI_PUSH_URL_TRUONG }}" \
              -d @loki-payload.json \
              || echo "Canh bao: push log Conftest sang Loki cua Truong that bai"
          fi