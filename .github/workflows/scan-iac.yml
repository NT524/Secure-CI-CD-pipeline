name: Infrastructure Security Scanning

on:
  workflow_call:

jobs:
  terraform-check:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # - name: Terraform Init & Validate
      #   run: |
      #     cd terraform
      #     terraform init -backend=false -input=false -upgrade
      #     terraform validate

  iac-scan:
    name: Checkov (IaC Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          skip_check: CKV2_AWS_11,CKV2_AWS_12,CKV_AWS_39,CKV_AWS_38
          skip_path: policy/,.github/workflows/
          output_format: json,sarif
          output_file_path: checkov-report
          soft_fail: false

      - name: Upload Checkov Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-iac-reports
          path: checkov-report*

      - name: Upload Checkov SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-report/results_sarif.sarif

      - name: Push Checkov Metrics to Prometheus Pushgateway
        if: always()
        run: |
          REPO="${{ github.repository }}"
          
          if [ -f "checkov-report/checkov-report.json" ]; then
            # Trích xuất trực tiếp số lượng check bị fail từ summary
            FAILED_COUNT=$(jq '.summary.failed' checkov-report/checkov-report.json || echo 0)
            STATUS=$([ "$FAILED_COUNT" -gt 0 ] && echo "FAILED" || echo "SUCCESS")
          else
            FAILED_COUNT=0
            STATUS="UNKNOWN"
          fi

          # 1. Khai báo Metric dạng Gauge cho Prometheus
          cat <<EOF > checkov_metrics.txt
          # HELP devsecops_checkov_failed_checks_total Number of failed infrastructure checks found by Checkov
          # TYPE devsecops_checkov_failed_checks_total gauge
          devsecops_checkov_failed_checks_total{repo="$REPO", scan_type="iac-scan", status="$STATUS"} $FAILED_COUNT
          EOF

          # 2. Xác thực qua tài khoản/API Key và đẩy dữ liệu mạng
          curl -k -X POST \
               -u "${{ secrets.PROMETHEUS_AUTH }}" \
               --data-binary @checkov_metrics.txt \
               ${{ secrets.PROMETHEUS_PUSHGATEWAY_URL }}

  conftest-scan:
    name: Conftest (Policy Scan)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONFTST_VERSION=0.59.0
          wget -qO- "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTST_VERSION}/conftest_${CONFTST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/conftest

      - name: Run Conftest Static Policy Scan
        continue-on-error: true
        run: |
          set +e
          conftest test terraform/*.tf k8s/*.yaml --policy policy/conftest > conftest-report.txt
          CONFTST_EXIT_CODE=$?
          conftest test terraform/*.tf k8s/*.yaml --policy policy/conftest --output json > conftest-report.json
          set -e
          echo "Conftest completed with exit code: $CONFTST_EXIT_CODE"
          exit 0

      - name: Upload Conftest Policy Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-policy-reports
          path: |
            conftest-report.txt
            conftest-report.json

      - name: Push Conftest Metrics to Prometheus Pushgateway
        if: always()
        run: |
          REPO="${{ github.repository }}"
          
          if [ -f "conftest-report.json" ]; then
            # Đếm tổng số lỗi quy tắc (failures) từ file report
            TOTAL_FAILURES=$(jq '[.[]?.failures[]?] | length' conftest-report.json || echo 0)
            STATUS=$([ "$TOTAL_FAILURES" -gt 0 ] && echo "FAILED" || echo "SUCCESS")
          else
            TOTAL_FAILURES=0
            STATUS="UNKNOWN"
          fi

          # 1. Định dạng dữ liệu chuẩn Prometheus (Gắn API key/Labels định danh)
          cat <<EOF > conftest_metrics.txt
          # HELP devsecops_conftest_failures_total Number of policy failures found by Conftest
          # TYPE devsecops_conftest_failures_total gauge
          devsecops_conftest_failures_total{repo="$REPO", scan_type="conftest-policy-scan", status="$STATUS"} $TOTAL_FAILURES
          EOF

          # 2. Sử dụng Basic Auth truyền API Key bảo mật để đẩy lên Pushgateway
          curl -k -X POST \
               -u "${{ secrets.PROMETHEUS_AUTH }}" \
               --data-binary @conftest_metrics.txt \
               ${{ secrets.PROMETHEUS_PUSHGATEWAY_URL }}
