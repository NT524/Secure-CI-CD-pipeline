name: Infrastructure Security Scanning

on:
  workflow_call:

jobs:
  terraform-check:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # - name: Terraform Init & Validate
      #   run: |
      #     cd terraform
      #     terraform init -backend=false -input=false -upgrade
      #     terraform validate

  iac-scan:
    name: Checkov (IaC Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          skip_check: CKV2_AWS_11,CKV2_AWS_12,CKV_AWS_39,CKV_AWS_38
          skip_path: policy/,.github/workflows/
          output_format: json,sarif
          output_file_path: checkov-report
          soft_fail: true

      - name: Upload Checkov Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-iac-reports
          path: checkov-report*

      - name: Upload Checkov SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-report/results_sarif.sarif

      - name: Push Checkov Metrics to Grafana Cloud Prometheus
        if: always()
        run: |
          REPO="${{ github.repository }}"
          
          if [ -f "checkov-report/checkov-report.json" ]; then
            # Trích xuất trực tiếp số lượng check bị fail từ summary
            FAILED_COUNT=$(jq '.summary.failed' checkov-report/checkov-report.json || echo 0)
            STATUS=$([ "$FAILED_COUNT" -gt 0 ] && echo "FAILED" || echo "SUCCESS")
          else
            FAILED_COUNT=0
            STATUS="UNKNOWN"
          fi

          # Chuẩn bị payload theo chuẩn Influx Line Protocol đồng bộ với hệ thống
          # Metric tạo ra trong Prometheus sẽ là: security_scan_checkov_failed_count
          PAYLOAD="security_scan,repo=${REPO},scan_type=iac-checkov,status=${STATUS} checkov_failed_count=${FAILED_COUNT}"

          echo "Đang đẩy metric Checkov lên Grafana Prometheus: $PAYLOAD"

          # Gửi qua endpoint tương thích của Grafana Cloud (Sử dụng lại cặp Secret đã tạo)
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROMETHEUS_AUTH }}" \
            -H "Content-Type: text/plain" \
            "https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/v1/push/influx/write" \
            -d "$PAYLOAD"
  conftest-scan:
    name: Conftest (Policy Scan)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONFTST_VERSION=0.59.0
          wget -qO- "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTST_VERSION}/conftest_${CONFTST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/conftest

      - name: Run Conftest Static Policy Scan
        continue-on-error: true
        run: |
          set +e
          conftest test terraform/*.tf k8s/*.yaml --policy policy/conftest > conftest-report.txt
          CONFTST_EXIT_CODE=$?
          conftest test terraform/*.tf k8s/*.yaml --policy policy/conftest --output json > conftest-report.json
          set -e
          echo "Conftest completed with exit code: $CONFTST_EXIT_CODE"
          exit 0

      - name: Upload Conftest Policy Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-policy-reports
          path: |
            conftest-report.txt
            conftest-report.json

      - name: Push IaC Scan Metrics to Grafana Prometheus
        if: always()
        run: |
          REPO="${{ github.repository }}"

          if [ -f "conftest-report.json" ]; then
            TOTAL_FAILURES=$(jq '[.[]?.failures[]?] | length' conftest-report.json)
          else
            TOTAL_FAILURES=0
          fi

          PAYLOAD="security_scan,repo=${REPO},scan_type=iac-scan iac_failures_count=${TOTAL_FAILURES}"

          echo "Đang đẩy metric lên Grafana Prometheus: $PAYLOAD"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PROMETHEUS_AUTH }}" \
            -H "Content-Type: text/plain" \
            "https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/v1/push/influx/write" \
            -d "$PAYLOAD"
