name: "DAST: ZAP Active Scan (Juice Shop Test)"

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string

  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 6"

jobs:
  dast_scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      target: ${{ inputs.target }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate JWT Token for ZAP Authentication
        id: create_token
        run: |
          TARGET_URL="${{ env.target }}"

          curl -s -X POST "$TARGET_URL/api/Users" \
            -H "Content-Type: application/json" \
            -d '{
              "email": "dast_tester@juice-sh.op",
              "password": "SecurePassword123!",
              "passwordRepeat": "SecurePassword123!",
              "securityQuestion": {"id": 1, "question": "Your eldest siblings middle name?"},
              "securityAnswer": "DevSecOps"
            }' || echo "User may already exist, continuing to login..."

          echo "==> Logging in to get token..."
          JWT_TOKEN="$(curl -s -X POST "$TARGET_URL/rest/user/login" \
            -H "Content-Type: application/json" \
            -d '{"email": "dast_tester@juice-sh.op", "password": "SecurePassword123!"}' | jq -r '.authentication.token // empty')"

          if [ -z "$JWT_TOKEN" ] || [ "$JWT_TOKEN" == "null" ]; then
            echo "❌ Failed to obtain JWT token for ZAP authentication. Aborting scan."
            exit 1
          fi
          echo "::add-mask::$JWT_TOKEN"
          echo "JWT_TOKEN=$JWT_TOKEN" >> $GITHUB_ENV

      - name: Chạy OWASP ZAP Full (Active) Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ env.target }}
          rules_file_name: ".zap/rules.tsv"
          issue_title: "🚨 DAST Alert: Vulnerabilities found in Juice Shop"
          fail_action: false
          cmd_options: >-
            -a -j
            -z "-config replacer.full_list(0).description=AuthHeader -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr= -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement='Authorization: Bearer ${{ env.JWT_TOKEN }}'"
          artifact_name: "zap-scan-report"

      - name: Lưu trữ báo cáo (Gather Findings)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report-files
          path: |
            report_html.html
            report_json.json

      - name: Push ZAP Scan Report to Grafana Loki
        if: always()
        run: |
          TIMESTAMP=$(date +%s%N)

          # SỬA LỖI: Đọc đúng file report_json.json của ZAP thay vì Trivy
          if [ -f "report_json.json" ]; then
            # Trích xuất gọn các thông tin Alert từ ZAP để đẩy lên Loki
            jq '[.site[].alerts[]? | {alert, riskdesc, confidence, cweid, wascid}]' report_json.json > zap_short.json
          else
            echo '[]' > zap_short.json
          fi

          # Tạo payload chuẩn gửi lên Loki
          jq -n \
            --arg ts "$TIMESTAMP" \
            --arg job "github-actions" \
            --arg scan_type "zap-dast-scan" \
            --arg target "${{ env.target }}" \
            --arg repo "${{ github.repository }}" \
            --slurpfile log zap_short.json \
            '{"streams": [{"stream": {"job": $job, "scan_type": $scan_type, "target_url": $target, "repo": $repo}, "values": [[$ts, ($log[0] | @json)]]}]}' > loki_payload.json

          # Gửi lên Loki
          curl -k -H "Content-Type: application/json" \
              -u "${{ secrets.LOKI_AUTH }}" \
              -X POST ${{ secrets.LOKI_URL }} \
              -d @loki_payload.json
