name: "DAST: ZAP Active Scan (Juice Shop Test)"

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string

  workflow_dispatch:

jobs:
  dast_scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      target: ${{ inputs.target }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate JWT Token for ZAP Authentication
        id: create_token
        run: |
          TARGET_URL="${{ env.target }}"

          curl -s -X POST "$TARGET_URL/api/Users" \
            -H "Content-Type: application/json" \
            -d '{
              "email": "dast_tester@juice-sh.op",
              "password": "SecurePassword123!",
              "passwordRepeat": "SecurePassword123!",
              "securityQuestion": {"id": 1, "question": "Your eldest siblings middle name?"},
              "securityAnswer": "DevSecOps"
            }' || echo "User may already exist, continuing to login..."

          echo "==> Logging in to get token..."
          JWT_TOKEN="$(curl -s -X POST "$TARGET_URL/rest/user/login" \
            -H "Content-Type: application/json" \
            -d '{"email": "dast_tester@juice-sh.op", "password": "SecurePassword123!"}' | jq -r '.authentication.token // empty')"

          if [ -z "$JWT_TOKEN" ] || [ "$JWT_TOKEN" == "null" ]; then
            echo "❌ Failed to obtain JWT token for ZAP authentication. Aborting scan."
            exit 1
          fi
          echo "::add-mask::$JWT_TOKEN"
          echo "JWT_TOKEN=$JWT_TOKEN" >> $GITHUB_ENV

      - name: OWASP ZAP Full (Active) Scan
        uses: zaproxy/action-full-scan@v0.13.0
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_VALUE: Bearer ${{ env.JWT_TOKEN }}
        with:
          docker_name: "owasp/zap2docker-weekly"
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ env.target }}
          rules_file_name: ".zap/rules.tsv"
          issue_title: "🚨 DAST Alert: Vulnerabilities found in application"
          fail_action: false
          cmd_options: >-
            -a -j -z " -config replacer.full_list(0).description=AuthHeader -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr= -config replacer.full_list(0).replacement=Authorization: Bearer ${{ env.JWT_TOKEN }} "
          artifact_name: "zap-scan-report"

      - name: Generate GitHub Annotations
        if: always()
        run: |
          jq -r ' .site[].alerts[] | select(.riskcode|tonumber >= 2) | "::warning title=\(.alert)::\(.desc)" ' report_json.json

      #################################################
      # Parse ZAP Report
      #################################################

      - name: Parse ZAP results & write summary JSON
        id: zap_parse
        if: always()
        run: |
          mkdir -p zap-out

          python3 << 'PY'
          import json
          import os

          result = {
              "high": 0,
              "medium": 0,
              "low": 0,
              "info": 0,
              "report_missing": True
          }

          if os.path.exists("report_json.json"):
              try:
                  with open("report_json.json", "r", encoding="utf-8") as f:
                      data = json.load(f)

                  alerts = []

                  for site in data.get("site", []):
                      alerts.extend(site.get("alerts", []))

                  result["high"] = sum(
                      1 for a in alerts
                      if str(a.get("riskcode")) == "3"
                  )

                  result["medium"] = sum(
                      1 for a in alerts
                      if str(a.get("riskcode")) == "2"
                  )

                  result["low"] = sum(
                      1 for a in alerts
                      if str(a.get("riskcode")) == "1"
                  )

                  result["info"] = sum(
                      1 for a in alerts
                      if str(a.get("riskcode")) == "0"
                  )

                  result["report_missing"] = False

              except Exception as e:
                  result["parse_error"] = str(e)

          with open("zap-out/zap-summary.json", "w") as f:
              json.dump(result, f)

          print(json.dumps(result, indent=2))
          PY

      #################################################
      # Upload Summary Artifact
      #################################################

      - name: Upload ZAP Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-summary
          path: zap-out/zap-summary.json

      #################################################
      # Create GitHub Issue
      #################################################

      - name: Create Security Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let high = 0;
            let medium = 0;
            let low = 0;
            let info = 0;

            try {
              const summary = JSON.parse(
                fs.readFileSync(
                  'zap-out/zap-summary.json',
                  'utf8'
                )
              );

              high = summary.high || 0;
              medium = summary.medium || 0;
              low = summary.low || 0;
              info = summary.info || 0;
            } catch (err) {
              console.log('Unable to read summary file');
              return;
            }

            if (high > 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 DAST: ${high} High-Risk Findings`,
                body: [
                  '## OWASP ZAP Scan Results',
                  '',
                  '| Severity | Count |',
                  '|----------|-------|',
                  `| 🔴 High | ${high} |`,
                  `| 🟠 Medium | ${medium} |`,
                  `| 🟡 Low | ${low} |`,
                  `| ℹ️ Info | ${info} |`,
                  '',
                  `Workflow Run: ${context.runId}`,
                  '',
                  'Review the uploaded ZAP artifacts for details.'
                ].join('\n'),
                labels: ['security', 'dast']
              });
            }


      - name: Lưu trữ báo cáo (Gather Findings)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report-files
          path: |
            report_html.html
            report_json.json
