  # --- DOCKER BUILD & CONTAINER SECURITY (Nhiệm vụ của Khôi) ---
  build-and-test:
    name: 3. Build & Test Application
    # Cập nhật: Chỉ chạy khi tất cả các công cụ quét bảo mật ở trên đã hoàn thành
    # needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    # Sử dụng if: always() để đảm bảo phần Build vẫn chạy bất kể các job trước thành công hay thất bại
    if: always()
    runs-on: ubuntu-latest # Mượn một máy ảo Ubuntu miễn phí của GitHub để chạy
    outputs:
      full_image_name: ${{ steps.prep.outputs.IMAGE_NAME }}

    # Cấp quyền để ghi vào Container Registry và ký Image (Cần thiết cho tuần 4)
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Bước 1: Lấy code từ GitHub về cái máy ảo Ubuntu kia
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Setup môi trường
      # --- Dành cho NodeJS ---
      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

          # # --- Dành cho Python ---
      # - name: 2. Setup Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: '3.10'

      # SỬA TẠI ĐÂY: Chuyển tên Repo về chữ thường để tránh lỗi Docker build
      - name: Prepare Image Name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/${REPO_LOWER}/nodegoat:${{ github.sha }}
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      # Bước 3: Build thử Docker Image
      - name: 3. Docker build image (Sửa tag để chuẩn bị Push)
        # Sửa tag nt524 thành đường dẫn GHCR để có thể push và ký
        working-directory: app/NodeJS/NodeGoat/
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      # Bước 4: Tạo SBOM với Syft (Nhiệm vụ Tuần 3)
      - name: 4. Generate SBOM with Syft
        # install syft and using Syft to generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json > sbom.spdx.json

      # Bước 5: THÊM MỚI BƯỚC NÀY ĐỂ LƯU FILE
      - name: 5. Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report # Tên của file nén hiển thị trên giao diện GitHub
          path: sbom.spdx.json # Tên file hoặc thư mục cần lưu trữ (phải khớp với tên file xuất ra ở trên)
          retention-days: 7 # (Tùy chọn) Giữ file này trên GitHub trong 7 ngày rồi tự động xóa cho nhẹ

      # Bước 6: Quét Image với Trivy (Nhiệm vụ Tuần 3)
      - name: 6. Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "table"
          exit-code: "0" # Nếu Trivy phát hiện lỗ hỏng mức HIGH hoặc CRITICAl, nó sẽ trả về mã lỗi 1
          ignore-unfixed: true # Báo các lỗ hỏng đã có bản vá
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # --- CẤU HÌNH BỔ SUNG TUẦN 4: PUSH & SIGN IMAGE (Nhiệm vụ của Trường) ---

      - name: 7. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 8. Push Docker Image to GHCR
        run: docker push ${{ env.IMAGE_NAME }}

      - name: 9. Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: 10. Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key ${{ env.IMAGE_NAME }}
          rm cosign.key

  # --- CẤU HÌNH BỔ SUNG TUẦN 4: DEPLOY TO STAGING (Nhiệm vụ của Khôi) ---
  # --- CẤU HÌNH DEPLOY TO AWS EKS STAGING (Nhiệm vụ của Khôi) ---
  deploy-staging:
    name: 4. Deploy to Staging Environment (AWS EKS)
    needs: build-and-test
    if: always()
    runs-on: ubuntu-latest

    outputs:
      staging_url: ${{ steps.get-endpoint.outputs.STAGING_URL }}
    env:
      # SỬA TẠI ĐÂY: Xóa biến KUBECONFIG local cũ đi. Ta sẽ dùng AWS CLI để sinh tự động.
      namespace: nodegoat-staging
      cluster_name: nodegoat-cluster  # Sửa lại đúng tên cụm EKS trên AWS của nhóm em
      aws_region: us-east-1           # Sửa lại đúng Region AWS của nhóm em

    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # ==========================================
      # XÁC THỰC TÀI KHOẢN AWS
      # Đảm bảo em đã add AWS_ACCESS_KEY_ID và AWS_SECRET_ACCESS_KEY vào GitHub Secrets
      # ==========================================
      - name: 2. Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.aws_region }}

      # ==========================================
      # TỰ ĐỘNG CẬP NHẬT KUBECONFIG TỪ CLOUD
      # ==========================================
      - name: 3. Authenticate with AWS EKS Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.cluster_name }} --region ${{ env.aws_region }}

      - name: 4. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 6. Terraform Apply (Khởi tạo Namespace Cô Lập)
        env:
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_app_image: ${{ needs.build-and-test.outputs.full_image_name }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
          TF_VAR_namespace: ${{ env.namespace }}
        working-directory: terraform
        run: |
          terraform init -upgrade 
          terraform apply -auto-approve

      - name: 7. Deploy Application Manifests to AWS
        env:
          APP_IMAGE: ${{ needs.build-and-test.outputs.full_image_name }}
        run: |
          # Thay thế image tag động từ kết quả của job build
          sed -i "s|\${app_image}|$APP_IMAGE|g" k8s/nodegoat_deployment.yaml
          
          # Apply tài nguyên vào K8s trên AWS
          kubectl apply -f k8s/ -n ${{ env.namespace }}

      - name: 8. Check Cloud Resource Rollout Status
        run: |
          echo "--- Kiểm tra trạng thái kích hoạt tài nguyên trên AWS ---"
          kubectl get pods -n ${{ env.namespace }}
          
          echo "--- Đợi Pod ứng dụng và DB qua vòng kiểm duyệt y tế của K8s ---"
          kubectl rollout status deployment/mongodb -n ${{ env.namespace }} --timeout=120s
          kubectl rollout status deployment/nodegoat-app -n ${{ env.namespace }} --timeout=120s

      # ==========================================
      # ĐỢI AWS CẤP PHÁT PUBLIC HOSTNAME (ELB)
      # Loại bỏ hoàn toàn Port-forwarding local bị kẹt lỗi 
      # ==========================================
      - name: 9. Extract AWS Staging Endpoint
        id: get-endpoint
        run: |
          echo "⏳ Đang truy vấn AWS Elastic Load Balancer (ELB)..."
          
          # Vòng lặp thông minh: Đợi tối đa 2 phút để AWS cấp phát xong Hostname
          for i in {1..12}; do
            AWS_HOST=$(kubectl get svc nodegoat-app -n ${{ env.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$AWS_HOST" ]; then
              break
            fi
            echo "AWS đang khởi tạo LoadBalancer vật lý, đợi thêm 10 giây... ($i/12)"
            sleep 10
          done

          # Kiểm tra nếu hết thời gian mà AWS vẫn chưa cấp IP/Hostname
          if [ -z "$AWS_HOST" ]; then
            echo "❌ THẤT BẠI: AWS quá hạn cấp phát LoadBalancer."
            kubectl describe svc nodegoat-app -n ${{ env.namespace }}
            exit 1
          fi

          # Xuất URL công khai để chuẩn bị cấp cho bước OWASP ZAP DAST phía dưới
          URL="http://${AWS_HOST}"
          echo "STAGING_URL=${URL}" >> $GITHUB_OUTPUT
          
          echo "--------------------------------------------------------"
          echo "🎯 THÀNH CÔNG RỰC RỠ! ỨNG DỤNG ĐÃ ĐƯỢC CHIA SẺ TRÊN INTERNET"
          echo "🌐 URL STAGING TRÊN AWS: ${URL}"
          echo "--------------------------------------------------------"
  dast-scan:
    name: 5. OWASP ZAP Authenticated DAST Scan
    runs-on: ubuntu-latest
    needs: deploy-staging # Chỉ chạy khi AWS EKS đã deploy xong xuôi
    permissions:
      issues: write      # Cấp quyền cho Runner tạo Issue tự động
      contents: read
    
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # Đọc file zap-automation và nạp biến môi trường động từ Cloud AWS
      - name: 2. Prepare ZAP Automation Plan
        env:
          TARGET_URL: ${{ needs.deploy-staging.outputs.staging_url }}
          # Sử dụng tài khoản test mặc định của NodeGoat (Đã bị giới hạn quyền trong DB)
          TEST_USER: "user1"
          TEST_PASSWORD: "password"
        run: |
          mkdir -p zap_workspace
          cp zap-automation.yaml zap_workspace/plan.yaml
          
          # Thay thế các biến môi trường vào file cấu hình của ZAP
          sed -i "s|\${TARGET_URL}|$TARGET_URL|g" zap_workspace/plan.yaml
          sed -i "s|\${TEST_USER}|$TEST_USER|g" zap_workspace/plan.yaml
          sed -i "s|\${TEST_PASSWORD}|$TEST_PASSWORD|g" zap_workspace/plan.yaml

      - name: 3. Run OWASP ZAP (Baseline + Active Authenticated Scan)
        run: |
          echo "🚀 Khởi động Docker OWASP ZAP bọc đánh Staging Endpoint..."
          # Chạy container chính chủ của ZAP, ánh xạ thư mục zap_workspace vào trong container
          docker run --user root -v $(pwd)/zap_workspace:/zap/wrk:rw -t ghcr.io/zaproxy/zaproxy:stable zap.sh -cmd -autorun /zap/wrk/plan.yaml || true

      # ========================================================
      # BƯỚC ĐẮT GIÁ: PARSE REPORT JSON & BIẾN ĐỔI THÀNH GITHUB ANNOTATIONS/ISSUES
      # ========================================================
      - name: 4. Parse ZAP Report & Generate Security Governance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import json
          import os
          import subprocess

          report_path = "zap_workspace/zap-report.json"
          if not os.path.exists(report_path):
              print("❌ Không tìm thấy file báo cáo từ ZAP.")
              exit(0)

          with open(report_path, "r") as f:
              data = json.load(f)

          # Trích xuất danh sách các lỗ hổng tìm được
          alerts = data.get("site", [{}])[0].get("alerts", [])
          
          critical_findings = []
          
          print("--- 📋 PHÂN TÍCH KẾT QUẢ DAST ---")
          for alert in alerts:
              risk = alert.get("riskcode") # 3: High, 2: Medium, 1: Low
              risk_desc = alert.get("riskdesc")
              name = alert.get("alert")
              desc = alert.get("desc")
              solution = alert.get("solution")
              
              # 1. Tạo GitHub Annotations cho từng lỗ hổng xuất hiện trong Log của Workflow
              if risk in ["3", "2"]: # Lọc lỗi High và Medium
                  print(f"::error title=[DAST Vulnerability - {risk_desc}]::{name} -> {alert.get('url')}")
              
              # 2. Gom các lỗi nặng (High) để chuẩn bị tạo GitHub Issue Chặn đợt Release
              if risk == "3":
                  critical_findings.append(f"### 🚨 {name}\n- **Mức độ nguy hiểm:** {risk_desc}\n- **Mô tả:** {desc}\n- **Khắc phục:** {solution}\n\n")

          # Nếu có lỗi Nguy hiểm (High), dùng GitHub CLI tự động tạo Issue giao việc cho Dev
          if critical_findings:
              print(f"⚠️ Phát hiện {len(critical_findings)} lỗi bảo mật nghiêm trọng! Đang tạo GitHub Issue...")
              issue_body = "## 🛡️ BÁO CÁO PHÁT HIỆN LỖ HỔNG BẢO MẬT (DAST SCAN)\n\n" + "".join(critical_findings)
              
              # Ghi file tạm để truyền vào body của Issue
              with open("issue_body.md", "w") as ib:
                  ib.write(issue_body)
                  
              subprocess.run([
                  "gh", "issue", "create",
                  "--title", "🚨 [DAST Alert] Phát hiện lỗ hổng nghiêm trọng trên môi trường Staging",
                  "--body-file", "issue_body.md",
                  "--label", "security",
                  "--assignee", "${{ github.actor }}"
              ])
              
              # Ép gãy pipeline để không cho phép deploy lên Production (Security Gate)
              print("❌ Pipeline dừng lại do không vượt qua bài kiểm tra bảo mật DAST!")
              exit(1)
          else:
              print("✅ Tuyệt vời! Không phát hiện lỗ hổng nguy hiểm ở mức High/Critical.")
