  # --- DOCKER BUILD & CONTAINER SECURITY (Nhiệm vụ của Khôi) ---
  build-and-test:
    name: Build & Push Application
    # Cập nhật: Chỉ chạy khi tất cả các công cụ quét bảo mật ở trên đã hoàn thành
    # needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    # Sử dụng if: always() để đảm bảo phần Build vẫn chạy bất kể các job trước thành công hay thất bại
      

    if: always()
    runs-on: ubuntu-latest # Mượn một máy ảo Ubuntu miễn phí của GitHub để chạy
    outputs:
      full_image_name: ${{ steps.prep.outputs.IMAGE_NAME }}
      current_version: ${{ steps.prep.outputs.VERSION }}
      current_env: ${{ steps.prep.outputs.ENV }}

    # Cấp quyền để ghi vào Container Registry và ký Image (Cần thiết cho tuần 4)
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Bước 1: Lấy code từ GitHub về cái máy ảo Ubuntu kia
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/NodeJS/juice-shop/package.json

      - name: Prepare Image Name & Environment
        id: prep
        run: |

          
          ENVIRONMENT=${{ env.ENVIRONMENT }}
          echo "ENV=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=${REPO_LOWER}" >> $GITHUB_ENV
          VERSION_TAG="${{ github.sha }}"
          IMAGE_NAME=ghcr.io/${REPO_LOWER}/juice-shop:${VERSION_TAG}-${ENVIRONMENT}
          
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION_TAG}" >> $GITHUB_OUTPUT
          
      

      - name: Thiết lập Docker Buildx (BuildKit)
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build và Push Image
        uses: docker/build-push-action@v5
        with:
          context: app/NodeJS/juice-shop/ # Đường dẫn đến thư mục chứa Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.REPO_LOWER }}/juice-shop:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with Syft
        # install syft and using Syft to generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json > sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report # Tên của file nén hiển thị trên giao diện GitHub
          path: sbom.spdx.json # Tên file hoặc thư mục cần lưu trữ (phải khớp với tên file xuất ra ở trên)
          retention-days: 7 # (Tùy chọn) Giữ file này trên GitHub trong 7 ngày rồi tự động xóa cho nhẹ

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "table"
          exit-code: "0" # Nếu Trivy phát hiện lỗ hỏng mức HIGH hoặc CRITICAl, nó sẽ trả về mã lỗi 1
          ignore-unfixed: true # Báo các lỗ hỏng đã có bản vá
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key ${{ env.IMAGE_NAME }}
          rm cosign.key

  # =========================================================
  # JOB QUẢN LÝ HẠ TẦNG CLOUD AWS (TERRAFORM IN FRASTRUCTURE)
  # =========================================================
  deploy-app-eks:
    name: Provision & Deploy to Amazon EKS
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "1"
      ENVIRONMENT: ${{ needs.build-and-test.outputs.current_env }}
      APP_IMAGE: ${{ needs.build-and-test.outputs.full_image_name }}
      TF_VAR_environment: ${{ needs.build-and-test.outputs.current_env }}
      

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Nạp AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI v2
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
      
      - name: Bootstrap Terraform Backend (S3 & DynamoDB)
        run: |
          echo "=== 1. Kiểm tra S3 Bucket: ${{ env.S3_BUCKET }} ==="
          if aws s3api head-bucket --bucket "${{ env.S3_BUCKET }}" 2>/dev/null; then
            echo "✅ S3 Bucket đã tồn tại."
          else
            echo "⏳ S3 Bucket chưa có. Đang tiến hành tạo mới..."
            if [ "${{ env.AWS_REGION }}" == "us-east-1" ]; then
              aws s3api create-bucket --bucket "${{ env.S3_BUCKET }}" --region "${{ env.AWS_REGION }}"
            else
              aws s3api create-bucket --bucket "${{ env.S3_BUCKET }}" --region "${{ env.AWS_REGION }}" --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
            fi
            aws s3api put-bucket-versioning --bucket "${{ env.S3_BUCKET }}" --versioning-configuration Status=Enabled
          fi

          echo "=== 2. Kiểm tra DynamoDB Table: ${{ env.DYNAMODB_TABLE }} ==="
          if aws dynamodb describe-table --table-name "${{ env.DYNAMODB_TABLE }}" 2>/dev/null; then
            echo "✅ DynamoDB Table đã tồn tại."
          else
            echo "⏳ DynamoDB Table chưa có. Đang tiến hành tạo mới..."
            aws dynamodb create-table \
              --table-name "${{ env.DYNAMODB_TABLE }}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${{ env.AWS_REGION }}"
            aws dynamodb wait table-exists --table-name "${{ env.DYNAMODB_TABLE }}" --region "${{ env.AWS_REGION }}"
          fi

      # 🌟 ĐƯA BƯỚC CLEAN LOCK LÊN ĐẦU ĐỂ PHÒNG TRƯỜNG HỢP PIPELINE TRƯỚC BỊ SẬP NGANG
      - name: Clean up Terraform Lock (Nếu có)
        run: |
          aws dynamodb delete-item \
            --table-name "${{ env.DYNAMODB_TABLE }}" \
            --key '{"LockID": {"S": "${{ env.S3_BUCKET }}/state/${{ env.ENVIRONMENT }}.tfstate"}}' \
            --region "${{ env.AWS_REGION }}" || echo "No active lock found."

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=state/${{ env.ENVIRONMENT }}.tfstate" \
            -backend-config="region=${{ env.S3_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.DYNAMODB_TABLE }}"

      # 🌟 ĐƯA BƯỚC REFRESH LÊN TRƯỚC PLAN ĐỂ DẬP TẮT LỖI RouteAlreadyExists
      - name: Terraform Refresh State
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
        run: terraform refresh

      - name: Terraform Plan EKS
        id: tf-plan-eks
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
        run: |
          cd terraform
          export exitcode=0
          terraform plan -detailed-exitcode -no-color -out tfplan
          export exitcode=$?
          
          if [ $exitcode -eq 1 ]; then
            echo "Terraform Plan Failed!"
            exit 1
          elif [ $exitcode -eq 2 ]; then
            echo "Drift detected. Need to run terraform apply"
            echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
            exit 0
          else 
            echo "No changes. Infrastructure is up-to-date."
            echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
            exit 0
          fi
      
      - name: Terraform destroy (Clean up resources after testing - Optional)
        if: ${{ steps.tf-plan-eks.outputs.exitcode == '2' || steps.tf-plan-eks.outputs.exitcode == '0' }}
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
        run: terraform destroy -auto-approve

      # 🌟 SỬA LẠI CÚ PHÁP CHẠY FILE PLAN CHUẨN XÁC
      - name: Terraform Apply (Provision EKS)
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
        if: ${{ steps.tf-plan-eks.outputs.exitcode == '2' || steps.tf-plan-eks.outputs.exitcode == '0' }}
        run: terraform apply tfplan

      - name: Install Ansible and Kubernetes dependencies
        run: |
          python3 -m pip install --upgrade pip
          # Cài các gói python cần thiết để Ansible nói chuyện được với AWS và Kubernetes
          pip install ansible boto3 botocore kubernetes

      - name: Install Ansible Collections
        run: |
          ansible-galaxy collection install amazon.aws
          ansible-galaxy collection install kubernetes.core

      - name: Deploy Application to EKS with Ansible
        env:
          # Truyền toàn bộ biến môi trường vào cho Ansible đọc
          CLUSTER_NAME: "juice-shop-cluster-${{ env.ENVIRONMENT }}"
          AWS_REGION: "us-east-1"
          APP_IMAGE: ${{ needs.build-and-test.outputs.full_image_name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ansible-playbook ansible/playbooks/deploy-k8s.yml
