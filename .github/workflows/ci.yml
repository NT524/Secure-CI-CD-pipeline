name: DevSecOps Baseline CI 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# 1. CẤU HÌNH TRIGGER: Khi nào thì pipeline này được chạy?
on:
  push:
    branches: [ "main", "dev" ] # Chạy khi có code push lên nhánh main hoặc dev
  pull_request:
    branches: [ "main" ]         # Chạy khi có ai đó tạo Pull Request đòi gộp code vào main

# 2. CẤU HÌNH JOBS: Các công việc cần làm
jobs:
  # --- KIỂM TRA HẠ TẦNG ---
  terraform-check:
    name: 1. Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 3. Terraform Init & Validate
        run: |
          cd terraform
          terraform init
          terraform validate

  # --- QUÉT MÃ NGUỒN BẢO MẬT (SAST) ---
  semgrep-scan:
    name: 2a. Semgrep (Multi-rules)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
      - name: 2. Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/nodejs p/owasp-top-ten

  python-scan:
    name: 2b. Bandit (Python SAST)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
      - name: 2. Run Bandit Scan
        run: |
          pip install bandit
          bandit -r . -f txt || true 

# --- TẠM TẮT GOLANG SCAN VÌ CHƯA CÓ CODE GO (TRÁNH LỖI NO PACKAGES FOUND) ---
# golang-scan:
#   name: 2c. Gosec (Go SAST)
#   needs: terraform-check
#   runs-on: ubuntu-latest
#   steps:
#     - name: 1. Checkout Source Code
#       uses: actions/checkout@v4
#     - name: 2. Run Gosec Security Scan
#       uses: securego/gosec@master
#       with:
#         args: ./...

  javascript-scan:
    name: 2d. ESLint (JS Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
      - name: 2. Run ESLint Scan
        working-directory: app/NodeJS/NodeGoat/
        run: |
          npm install
          npx eslint . --ext .js || true

  # --- QUÉT BẢO MẬT HẠ TẦNG (Nhiệm vụ Tuần 3 của Trường) ---
  iac-scan:
    name: 2e. Checkov (IaC Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          # Để xử lý False Positive (ví dụ lỗi CKV_AWS_20), có thể thêm dòng sau:
          # skip_check: CKV_AWS_20 
          skip_check: CKV2_AWS_11,CKV2_AWS_12

  # ---  DOCKER BUILD  ---
  build-and-test:
    name: Build & Test Application
    # Cập nhật: Chỉ chạy khi tất cả 4 công cụ quét bảo mật (3 SAST + 1 IaC) ở trên đã hoàn thành (thêm golang-scan vào nếu sau này có code Go nhé)
    # needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    runs-on: ubuntu-latest      # Mượn một máy ảo Ubuntu miễn phí của GitHub để chạy

    steps:
      # Bước 1: Lấy code từ GitHub về cái máy ảo Ubuntu kia
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Setup môi trường (Thầy để sẵn mẫu, em dùng Python hay Node thì mở comment phần đó ra nhé)
      # --- Dành cho NodeJS ---
      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # # --- Dành cho Python ---
      # - name: 2. Setup Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: '3.10'

      # Bước 3: Build thử Docker Image
      - name: 3. Test Docker Build (No Push)
        # Mục đích tuần 1: Chỉ cần build thành công, không báo lỗi là đạt. Chưa cần đẩy lên Registry.
        run: |
          echo "Bắt đầu đóng gói ứng dụng bằng Docker..."
          docker build -t capstone-app:test-build ./app/NodeJS/NodeGoat/
          echo "Build thành công! Sẵn sàng cho các bài test bảo mật ở tuần sau!"