name: DevSecOps Integrated Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 1. CẤU HÌNH TRIGGER: Khi nào thì pipeline này được chạy?
on:
  push:
    branches:
      - "main"
      - "dev"
      - "feature/docker_build"
      - "feature/integration"
      - "feature/terraform"
      - "policy_gate_v2"
  pull_request:
    branches: ["main"]

# BỔ SUNG QUAN TRỌNG: Cấp quyền ở file Mẹ để ủy quyền xuống cho các file Con
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # Gọi file Scan chạy đầu tiên (Đã đổi tên cho đẹp)
  Scan:
    uses: ./.github/workflows/scan.yml

  # Gọi file Build chạy sau khi Scan xong
  Build:
    needs: Scan
    uses: ./.github/workflows/build.yml
    secrets: inherit # Kế thừa các secret từ repo

  # Gọi file Deploy chạy cuối cùng, truyền output image_name từ file Build sang
  Deploy:
    needs: Build
    uses: ./.github/workflows/deploy.yml
    with:
      full_image_name: ${{ needs.Build.outputs.full_image_name }}
    secrets: inherit