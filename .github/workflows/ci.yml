name: DevSecOps Integrated Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 1. CẤU HÌNH TRIGGER: Khi nào thì pipeline này được chạy?
on:
  push:
    branches:
      - "main"
      - "dev"
      - "feature/docker_build"
      - "feature/integration"
      - "feature/terraform"
      - "policy_gate_v2"
  pull_request:
    branches: ["main"] # Chạy khi có ai đó tạo Pull Request đòi gộp code vào main

jobs:
  # Gọi file Scan chạy đầu tiên
  trigger-scan:
    uses: ./.github/workflows/scan.yml

  # Gọi file Build chạy sau khi Scan xong
  trigger-build:
    needs: trigger-scan
    uses: ./.github/workflows/build.yml
    secrets: inherit # Kế thừa các secret từ repo

  # Gọi file Deploy chạy cuối cùng, truyền output image_name từ file Build sang
  trigger-deploy:
    needs: trigger-build
    uses: ./.github/workflows/deploy.yml
    with:
      full_image_name: ${{ needs.trigger-build.outputs.full_image_name }}
    secrets: inherit