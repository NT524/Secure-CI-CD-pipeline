  # --- DOCKER BUILD & CONTAINER SECURITY (Nhiệm vụ của Khôi) ---
  build-and-test:
    name: 3. Build & Test Application
    # Cập nhật: Chỉ chạy khi tất cả các công cụ quét bảo mật ở trên đã hoàn thành
    # needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    # Sử dụng if: always() để đảm bảo phần Build vẫn chạy bất kể các job trước thành công hay thất bại
    if: always()
    runs-on: ubuntu-latest # Mượn một máy ảo Ubuntu miễn phí của GitHub để chạy
    outputs:
      full_image_name: ${{ steps.prep.outputs.IMAGE_NAME }}

    # Cấp quyền để ghi vào Container Registry và ký Image (Cần thiết cho tuần 4)
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Bước 1: Lấy code từ GitHub về cái máy ảo Ubuntu kia
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Setup môi trường
      # --- Dành cho NodeJS ---
      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

          # # --- Dành cho Python ---
      # - name: 2. Setup Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: '3.10'

      # SỬA TẠI ĐÂY: Chuyển tên Repo về chữ thường để tránh lỗi Docker build
      - name: Prepare Image Name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/${REPO_LOWER}/nodegoat:${{ github.sha }}
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      # Bước 3: Build thử Docker Image
      - name: 3. Docker build image (Sửa tag để chuẩn bị Push)
        # Sửa tag nt524 thành đường dẫn GHCR để có thể push và ký
        working-directory: app/NodeJS/NodeGoat/
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      # Bước 4: Tạo SBOM với Syft (Nhiệm vụ Tuần 3)
      - name: 4. Generate SBOM with Syft
        # install syft and using Syft to generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json > sbom.spdx.json

      # Bước 5: THÊM MỚI BƯỚC NÀY ĐỂ LƯU FILE
      - name: 5. Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report # Tên của file nén hiển thị trên giao diện GitHub
          path: sbom.spdx.json # Tên file hoặc thư mục cần lưu trữ (phải khớp với tên file xuất ra ở trên)
          retention-days: 7 # (Tùy chọn) Giữ file này trên GitHub trong 7 ngày rồi tự động xóa cho nhẹ

      # Bước 6: Quét Image với Trivy (Nhiệm vụ Tuần 3)
      - name: 6. Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "table"
          exit-code: "0" # Nếu Trivy phát hiện lỗ hỏng mức HIGH hoặc CRITICAl, nó sẽ trả về mã lỗi 1
          ignore-unfixed: true # Báo các lỗ hỏng đã có bản vá
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # --- CẤU HÌNH BỔ SUNG TUẦN 4: PUSH & SIGN IMAGE (Nhiệm vụ của Trường) ---

      - name: 7. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 8. Push Docker Image to GHCR
        run: docker push ${{ env.IMAGE_NAME }}

      - name: 9. Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: 10. Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key ${{ env.IMAGE_NAME }}
          rm cosign.key

  # =========================================================
  # JOB QUẢN LÝ HẠ TẦNG CLOUD AWS (TERRAFORM IN FRASTRUCTURE)
  # =========================================================
  provision-infrastructure:
    name: 4A. Triển khai Hạ tầng với Terraform & Ansible
    runs-on: ubuntu-latest
    outputs:
      staging_public_ip: ${{ steps.set-ip.outputs.ip }}
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Trích xuất IP của máy chủ mới
        id: set-ip
        run: |
          PUBLIC_IP=$(terraform output -raw staging_public_ip)
          echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          
          # Cập nhật động IP vừa tạo vào file inventory của Ansible
          sed -i "s|ansible_host=[0-9.]*|ansible_host=${PUBLIC_IP}|g" ansible/inventory.ini

      # 🌟 BƯỚC THẦN THÁNH: Gọi Ansible cấu hình môi trường K3s
      - name: Thiết lập Private Key cho Ansible kết nối
        run: |
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > nodegoat-staging-key.pem
          chmod 400 nodegoat-staging-key.pem

      - name: Cài đặt Ansible & Chạy Playbook cấu hình K3s
        run: |
          sudo apt-get update && sudo apt-get install -y ansible
          # Cài thêm thư viện để Ansible thao tác được với lệnh Kubernetes k8s module
          ansible-galaxy collection install kubernetes.core
          pip install kubernetes
          
          # Thực thi kịch bản cài đặt
          cd ansible
          ansible-playbook -i inventory.ini playbooks/setup_k3s.yml

  # =========================================================
  # JOB CẤU HÌNH & TRIỂN KHAI ỨNG DỤNG (K8S/K3S DEPLOYMENT)
  # =========================================================
  deploy-app-k3s:
    name: 5. Deploy Manifests to K3s Cluster
    runs-on: ubuntu-latest
    needs: [build-and-test, provision-infrastructure]
    outputs:
      staging_url: http://${{ needs.provision-infrastructure.outputs.staging_public_ip }}
    
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Kiểm tra trạng thái thông mạch cổng SSH (22) trên AWS
        run: |
          TARGET_IP="${{ needs.provision-infrastructure.outputs.staging_public_ip }}"
          echo "🔍 Đang thăm dò kết nối tới địa chỉ AWS: ${TARGET_IP}..."
          for i in {1..12}; do
            if nc -zv -w 3 $TARGET_IP 22; then
              echo "✅ [SUCCESS] Cổng SSH đã mở hoàn toàn! Sẵn sàng bàn giao cho Runner deploy."
              exit 0
            fi
            echo "⏳ Cổng SSH (22) phản hồi từ chối. Server đang load OS, chờ 5 giây (Lần thử $i/12)..."
            sleep 5
          done
          exit 1

      - name: 3. Deploy Kubernetes Manifests via SSH Remote
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.build-and-test.outputs.full_image_name }}
        with:
          host: ${{ needs.provision-infrastructure.outputs.staging_public_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          envs: APP_IMAGE
          script_stop: true # 🌟 ÉP BUỘC GÃY ĐỂ ĐÈ BUG: Báo đỏ ngay nếu lệnh nào trong script bị lỗi
          script: |
            echo "=== [BƯỚC 1] KHỞI ĐỘNG VÀ KIỂM TRA HỆ THỐNG K3S ==="
            echo "🚚 Docker Image đích: $APP_IMAGE"
            
            # 🌟 TỰ ĐỘNG CÀI K3S NẾU MÁY ẢO CHƯA CÓ (Self-Healing)
            if ! command -v k3s &> /dev/null; then
              echo "⚙️ K3s chưa được cài đặt! Tiến hành cài đặt tự động qua SSH..."
              curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
              echo "⏳ Đợi 10 giây cho dịch vụ K3s khởi tạo..."
              sleep 10
            else
              echo "✅ Đã phát hiện K3s có sẵn trên hệ thống."
            fi
            
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            
            echo "🤖 Chờ hệ thống K3s API sẵn sàng hoạt động..."
            for i in {1..15}; do
              if kubectl get nodes > /dev/null 2>&1; then
                echo "✅ Hệ thống K3s core đã Online!"
                break
              fi
              echo "⏳ Đang đợi API Server của K3s trả lời (Lần thử $i/15)..."
              sleep 5
            done
            
            # Bỏ sudo để tránh lỗi PATH, user ubuntu đã có quyền truy cập k3s.yaml
            echo "🏢 Kiểm tra không gian tên (Namespace) staging..."
            kubectl create namespace nodegoat-staging || true
            
            echo "=== [BƯỚC 2] TẢI MÃ NGUỒN MANIFESTS ==="
            rm -rf app
            echo "📥 Tiến hành clone bản sạch trực tiếp từ nhánh feature/testing_aws..."
            git clone https://github.com/NT524/Secure-CI-CD-pipeline.git -b feature/testing_aws app
            cd app
            
            echo "=== [BƯỚC 3] TRIỂN KHAI DATABASE MONGODB ==="
            kubectl apply -f k8s/mongodb_deployment.yaml
            kubectl apply -f k8s/mongodb_service.yaml
            
            echo "=== [BƯỚC 4] CẤU HÌNH VÀ TRIỂN KHAI APP NODEGOAT ==="
            echo "🔧 Đang thực hiện thay thế token image động vào file deployment..."
            sed -i "s|\${app_image}|$APP_IMAGE|g" k8s/nodegoat_deployment.yaml
            
            echo "🔍 Kiểm tra nội dung file sau khi cập nhật image tag:"
            grep -A 2 -B 2 "image:" k8s/nodegoat_deployment.yaml
            
            kubectl apply -f k8s/nodegoat_deployment.yaml
            kubectl apply -f k8s/nodegoat_service.yaml
            
            echo "=== [BƯỚC 5] CẬP NHẬT NÓNG VÀ KIỂM TRA TRẠNG THÁI POD ==="
            kubectl rollout restart deployment/nodegoat-app -n nodegoat-staging || true
            
            echo "📊 Đang chờ các Pod trên Kubernetes Cluster chuyển sang trạng thái Running..."
            kubectl rollout status deployment/mongodb -n nodegoat-staging --timeout=60s
            kubectl rollout status deployment/nodegoat-app -n nodegoat-staging --timeout=90s
            
            echo "🎉 [SUCCESS] Hệ thống K3s và CI/CD đã chạy thành công tuyệt đối!"
