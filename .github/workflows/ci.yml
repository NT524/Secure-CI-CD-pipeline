name: DevSecOps Integrated Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 1. CẤU HÌNH TRIGGER: Khi nào thì pipeline này được chạy?
on:
  push:
    branches:
      - "main"
      - "dev"
      - "feature/docker_build"
      - "feature/integration"
      - "feature/terraform"
  pull_request:
    branches: ["main"] # Chạy khi có ai đó tạo Pull Request đòi gộp code vào main

# 2. CẤU HÌNH JOBS: Các công việc cần làm
jobs:
  # --- KIỂM TRA HẠ TẦNG (Nhiệm vụ chung) ---
  terraform-check:
    name: 1. Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 3. Terraform Init & Validate
        run: |
          cd terraform
          terraform init
          terraform validate

  # --- QUÉT MÃ NGUỒN BẢO MẬT (SAST - Nhiệm vụ của Trường) ---
  semgrep-scan:
    name: 2a. Semgrep (Multi-rules)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
      - name: 2. Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/nodejs p/owasp-top-ten

  python-scan:
    name: 2b. Bandit (Python SAST)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
      - name: 2. Run Bandit Scan
        run: |
          pip install bandit
          bandit -r . -f txt || true

  # --- TẠM TẮT GOLANG SCAN VÌ CHƯA CÓ CODE GO (TRÁNH LỖI NO PACKAGES FOUND) ---
  #  golang-scan:
  #    name: 2c. Gosec (Go SAST)
  #    needs: terraform-check
  #    runs-on: ubuntu-latest
  #    steps:
  #      - name: 1. Checkout Source Code
  #        uses: actions/checkout@v4
  #      - name: 2. Run Gosec Security Scan
  #        uses: securego/gosec@master
  #        with:
  #          args: ./...

  javascript-scan:
    name: 2d. ESLint (JS Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4
      - name: 2. Run ESLint Scan
        working-directory: app/NodeJS/NodeGoat/
        run: |
          npm install
          npx eslint . --ext .js || true

  # --- QUÉT BẢO MẬT HẠ TẦNG (Nhiệm vụ Tuần 3 của Trường) ---
  iac-scan:
    name: 2e. Checkov (IaC Security)
    needs: terraform-check
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          # Để xử lý False Positive (ví dụ lỗi CKV_AWS_20), có thể thêm dòng sau:
          # skip_check: CKV_AWS_20
          skip_check: CKV2_AWS_11,CKV2_AWS_12

  # --- DOCKER BUILD & CONTAINER SECURITY (Nhiệm vụ của Khôi) ---
  build-and-test:
    name: 3. Build & Test Application
    # Cập nhật: Chỉ chạy khi tất cả các công cụ quét bảo mật ở trên đã hoàn thành
    needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    # Sử dụng if: always() để đảm bảo phần Build vẫn chạy bất kể các job trước thành công hay thất bại
    if: always()
    runs-on: ubuntu-latest # Mượn một máy ảo Ubuntu miễn phí của GitHub để chạy
    outputs:
      full_image_name: ${{ steps.prep.outputs.IMAGE_NAME }}

    # Cấp quyền để ghi vào Container Registry và ký Image (Cần thiết cho tuần 4)
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Bước 1: Lấy code từ GitHub về cái máy ảo Ubuntu kia
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Setup môi trường
      # --- Dành cho NodeJS ---
      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

          # # --- Dành cho Python ---
      # - name: 2. Setup Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: '3.10'

      # SỬA TẠI ĐÂY: Chuyển tên Repo về chữ thường để tránh lỗi Docker build
      - name: Prepare Image Name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/${REPO_LOWER}/nodegoat:${{ github.sha }}
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      # Bước 3: Build thử Docker Image
      - name: 3. Docker build image (Sửa tag để chuẩn bị Push)
        # Sửa tag nt524 thành đường dẫn GHCR để có thể push và ký
        working-directory: app/NodeJS/NodeGoat/
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      # Bước 4: Tạo SBOM với Syft (Nhiệm vụ Tuần 3)
      - name: 4. Generate SBOM with Syft
        # install syft and using Syft to generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json > sbom.spdx.json

      # Bước 5: THÊM MỚI BƯỚC NÀY ĐỂ LƯU FILE
      - name: 5. Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report # Tên của file nén hiển thị trên giao diện GitHub
          path: sbom.spdx.json # Tên file hoặc thư mục cần lưu trữ (phải khớp với tên file xuất ra ở trên)
          retention-days: 7 # (Tùy chọn) Giữ file này trên GitHub trong 7 ngày rồi tự động xóa cho nhẹ

      # Bước 6: Quét Image với Trivy (Nhiệm vụ Tuần 3)
      - name: 6. Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "table"
          exit-code: "0" # Nếu Trivy phát hiện lỗ hỏng mức HIGH hoặc CRITICAl, nó sẽ trả về mã lỗi 1
          ignore-unfixed: true # Báo các lỗ hỏng đã có bản vá
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # --- CẤU HÌNH BỔ SUNG TUẦN 4: PUSH & SIGN IMAGE (Nhiệm vụ của Trường) ---

      - name: 7. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 8. Push Docker Image to GHCR
        run: docker push ${{ env.IMAGE_NAME }}

      - name: 9. Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: 10. Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key ${{ env.IMAGE_NAME }}
          rm cosign.key

  # --- CẤU HÌNH BỔ SUNG TUẦN 4: DEPLOY TO STAGING (Nhiệm vụ của Khôi) ---
  deploy-staging:
    needs: build-and-test
    if: always() # Đảm bảo bước này vẫn chạy dù có lỗi ở các bước trước (ví dụ: quét bảo mật phát hiện lỗ hổng)
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: ${{ github.workspace }}/terraform/kubeconfig
      namespace: nodegoat-staging
      cluster_name: nodegoat-cluster
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Pull Image
        run: |
          # dockerpull mogo:4.4
          docker pull ${{ needs.build-and-test.outputs.full_image_name }}

      - name: 4. Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 5. Setup kind CLI
        uses: engineerd/setup-kind@v0.5.0

      - name: 6. Build local cosign verification provider image
        run: |
          docker build -t local/cosign-gatekeeper-provider:dev policy/cosign-provider

      - name: 7. Terraform Apply
        env:
          # Truyền PAT vào để Terraform tạo Secret kéo image
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_app_image: ${{ needs.build-and-test.outputs.full_image_name }}
          TF_VAR_cluster_name: ${{ env.cluster_name }}
          TF_VAR_namespace: ${{ env.namespace }}
        working-directory: terraform

        run: |
          terraform init -upgrade 
          terraform apply -auto-approve

      - name: 8. Load provider image into kind
        run: |
          kind load docker-image local/cosign-gatekeeper-provider:dev --name ${{ env.cluster_name }}

      - name: 9. Install Gatekeeper with external data enabled
        run: |
          kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper/release-3.10/deploy/gatekeeper.yaml
          kubectl -n gatekeeper-system patch deployment gatekeeper-controller-manager --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-external-data"}]'
          kubectl -n gatekeeper-system patch deployment gatekeeper-audit --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-external-data"}]'
          kubectl -n gatekeeper-system rollout status deployment/gatekeeper-controller-manager --timeout=180s
          kubectl -n gatekeeper-system rollout status deployment/gatekeeper-audit --timeout=180s

      - name: 10. Sync Cosign public key and registry auth into cluster
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          kubectl create namespace cosign-system --dry-run=client -o yaml | kubectl apply -f -
          printf '%s\n' "$COSIGN_PUBLIC_KEY" > cosign.pub
          kubectl -n cosign-system create secret generic cosign-public-key \
            --from-file=cosign.pub=./cosign.pub \
            --dry-run=client -o yaml | kubectl apply -f -
          AUTH=$(printf '%s:%s' "$GHCR_USERNAME" "$GHCR_PAT" | base64 -w0)
          cat > config.json <<EOF
          {"auths":{"ghcr.io":{"auth":"$AUTH"}}}
          EOF
          kubectl -n cosign-system create secret generic ghcr-registry-auth \
            --from-file=config.json=./config.json \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f cosign.pub
          rm -f config.json

      - name: 11. Apply Gatekeeper policy gate
        run: |
          kubectl apply -f policy/gatekeeper/provider-deployment.yaml
          kubectl apply -f policy/gatekeeper/provider.yaml
          kubectl apply -f policy/gatekeeper/constraint-template.yaml
          for i in $(seq 1 30); do
            if kubectl get crd k8srequiredimagesignatures.constraints.gatekeeper.sh >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          kubectl apply -f policy/gatekeeper/constraint.yaml

      - name: 12. Deploy Application Manifests
        env:
          APP_IMAGE: ${{ needs.build-and-test.outputs.full_image_name }}
          # Trỏ KUBECONFIG vào file mà Terraform vừa xuất ra
        run: |
          # 1. Thay thế biến image vào các file YAML
          # Lưu ý: Lệnh này tìm chuỗi ${app_image} và thay bằng tag thực tế
          sed -i "s|\${app_image}|$APP_IMAGE|g" k8s/nodegoat_deployment.yaml

          # 2. Apply database vào namespace riêng
          kubectl apply -f k8s/mongodb_namespace.yaml
          kubectl apply -f k8s/mongodb_deployment.yaml
          kubectl apply -f k8s/mongodb_service.yaml

          # 3. Apply ứng dụng vào namespace staging có policy gate
          kubectl apply -f k8s/nodegoat_deployment.yaml
          kubectl apply -f k8s/nodegoat_service.yaml

      - name: 13. Health Check
        run: |

          echo "--- Trạng thái các Pod ---"
          kubectl get pods -n nodegoat-data
          kubectl get pods -n ${{ env.namespace }}

          echo "--- Đợi Deployment hoàn tất ---"
          # Chờ tối đa 2 phút cho mỗi service
          kubectl rollout status deployment/mongodb -n nodegoat-data --timeout=120s
          kubectl rollout status deployment/nodegoat-app -n ${{ env.namespace }} --timeout=120s

          echo "--- Kiểm tra log ứng dụng nếu cần ---"
          # Lệnh này giúp bạn xem app có kết nối DB thành công không
          kubectl get svc -n nodegoat-data
          kubectl get svc -n ${{ env.namespace }}
          kubectl get pods -n nodegoat-data
          kubectl get pods -n ${{ env.namespace }}

      - name: 14. Integration Test (Curl App)
        run: |
          kubectl get svc -n nodegoat-data
          kubectl get svc -n ${{ env.namespace }}
          kubectl get pods -n nodegoat-data
          kubectl get pods -n ${{ env.namespace }}
          kubectl get service/nodegoat-app -n ${{ env.namespace }}

          # echo "--- Đang kiểm tra cổng mạng bên trong Pod ---"
          # # Kiểm tra xem có dòng nào chứa ':4000' và 'LISTEN' không
          # if kubectl exec deployment/nodegoat-app -n ${{ env.namespace }} -- netstat -tulpn | grep -q ":4000.*LISTEN"; then
          #   echo "✅ Node.js đang lắng nghe trên cổng 4000"
          # else
          #   echo "❌ Không tìm thấy cổng 4000 đang LISTEN"
          #   kubectl logs deployment/nodegoat-app -n ${{ env.namespace }} --tail=20
          #   exit 1
          # fi
