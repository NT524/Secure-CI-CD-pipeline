  # =========================================================
  # JOB CẤU HÌNH & TRIỂN KHAI ỨNG DỤNG (K8S/K3S DEPLOYMENT)
  # =========================================================
  deploy-app-k3s:
    name: 5. Deploy Manifests to K3s Cluster
    runs-on: ubuntu-latest
    # CHỈ CHẠY khi Job tạo hạ tầng (4A) thành công rực rỡ
    # needs: [build-and-test, provision-infrastructure]
    outputs:
      staging_url: http://13.220.63.189
    
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      # FLOW KIỂM TRA ĐẶC BIỆT: Vòng lặp tự động dò cổng SSH của server mới/cũ
      - name: 2. Kiểm tra trạng thái thông mạch cổng SSH (22) trên AWS
        run: |
          TARGET_IP="13.220.63.189"
          echo "🔍 Đang thăm dò kết nối tới địa chỉ AWS: ${TARGET_IP}..."
          
          # Thử kết nối tối đa 12 lần, mỗi lần cách nhau 5 giây (Tổng cộng 60 giây chờ)
          for i in {1..12}; do
            if nc -zv -w 3 $TARGET_IP 22; then
              echo "✅ [SUCCESS] Cổng SSH đã mở hoàn toàn! Sẵn sàng bàn giao cho Runner deploy."
              exit 0
            fi
            echo "⏳ Cổng SSH (22) phản hồi từ chối (Connection refused). Server đang load OS, chờ 5 giây (Lần thử $i/12)..."
            sleep 5
          done
          
          echo "❌ [TIMEOUT] Máy chủ không phản hồi cổng 22 sau 1 phút!"
          exit 1

      - name: 3. Deploy Kubernetes Manifests via SSH Remote
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ghcr.io/nt524/secure-ci-cd-pipeline/nodegoat:f962aa8e666629b944d066ad1c5c82f63f4490fb
          host: 13.220.63.189
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          envs: APP_IMAGE
          script: |
            echo "🤖 Đang đồng bộ hóa hệ thống K3s trên AWS..."
            until sudo kubectl get nodes; do sleep 3; done
            
            # Quản lý thư mục chứa mã nguồn k8s manifests trên EC2
            if [ ! -d "app" ]; then
              git clone https://github.com/${{ github.repository }}.git app
              cd app
            else
              cd app
              git fetch --all && git reset --hard origin/${{ github.ref_name }}
            fi
            
            # Tiến hành nạp (Apply) các cấu hình Kubernetes của trường vào hệ thống
            sudo kubectl apply -f k8s/mongodb_deployment.yaml
            sudo kubectl apply -f k8s/mongodb_service.yaml
            
            sed -i "s|\${app_image}|$APP_IMAGE|g" k8s/nodegoat_deployment.yaml
            sudo kubectl apply -f k8s/nodegoat_deployment.yaml
            sudo kubectl apply -f k8s/nodegoat_service.yaml
            
            # Thực hiện cập nhật nóng (Zero-downtime rolling restart) nếu app đã chạy từ trước
            sudo kubectl rollout restart deployment/nodegoat-app -n nodegoat-staging || true
            
            echo "📊 Trạng thái kiểm tra Pod triển khai:"
            sudo kubectl rollout status deployment/nodegoat-app -n nodegoat-staging --timeout=90s || true
