  name: Infrastructure Deploy and Gatekeeper

  on:
    pull_request:
      types:
        - closed
      paths-ignore:
        - "VERSION"
      branches:
        - dev
    push:
      branches:
        - prod
        - dev
        - staging
      paths-ignore:
        - "VERSION"
        - "README.md"
    workflow_dispatch:

    workflow_call:
      inputs:
        ENVIRONMENT:
          required: true
          type: string
        AWS_REGION:
          required: true
          type: string
        CLUSTER_NAME:
          required: true
          type: string
        K8S_NAMESPACE:
          required: true
          type: string

  permissions:
    contents: read
    packages: write
    id-token: write
    security-events: write

  env:
    AWS_REGION: ${{ inputs.AWS_REGION }}
    ECR_REPOSITORY: nt524
    POLICY_GATE: cosign-gatekeeper-provider 
    ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
    CLUSTER_NAME: ${{ inputs.CLUSTER_NAME }}
    K8S_NAMESPACE: ${{ inputs.K8S_NAMESPACE }}

  jobs:
    Deploy-Gatekeeper:
      name: Gatekeeper Policy Check and Deploy to EKS
      runs-on: ubuntu-latest

      steps:
        - name: Checkout source code
          uses: actions/checkout@v4

        - name: AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Install AWS CLI v2
          run: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install --update

        - name: Install Kubectl
          uses: azure/setup-kubectl@v4
          with:
            version: "latest"

        - name: Update kubeconfig for EKS
          run: |
            aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}


        # TRIỂN KHAI TOÀN BỘ CHỐT KIỂM SOÁT OPA GATEKEEPER
        - name: Install Gatekeeper with external data enabled
          run: |
            kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper/release-3.13/deploy/gatekeeper.yaml
            # Đợi một chút để K8s đăng ký xong các CRD của Gatekeeper
            sleep 10
            
            # Sử dụng đúng đường dẫn gốc trong thư mục pod-security-policy của OPA Gatekeeper Library
            kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper-library/master/library/pod-security-policy/privileged-containers/template.yaml
            kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper-library/master/library/pod-security-policy/read-only-root-filesystem/template.yaml
            kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper-library/master/library/pod-security-policy/capabilities/template.yaml

            
            sleep 10

            # Bật tính năng External Data cho Gatekeeper
            kubectl -n gatekeeper-system patch deployment gatekeeper-controller-manager --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-external-data"}]'
            kubectl -n gatekeeper-system patch deployment gatekeeper-audit --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-external-data"}]'
            
            # Chờ quá trình restart pod hoàn tất
            kubectl -n gatekeeper-system rollout status deployment/gatekeeper-controller-manager --timeout=180s
            kubectl -n gatekeeper-system rollout status deployment/gatekeeper-audit --timeout=180s

            echo "⏳ Đợi 20 giây để Gatekeeper Webhook khởi động mạng hoàn tất..."
            sleep 20

        - name: Sync Cosign public key and registry auth into cluster
          env:
            COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          run: |
            kubectl create namespace cosign-system --dry-run=client -o yaml | kubectl apply -f -

            # 🛠️ VÁ LỖI: Tạo secret chứa khóa công khai của Cosign để Provider đối chiếu
            echo "$COSIGN_PUBLIC_KEY" > cosign.pub
            kubectl -n cosign-system delete secret cosign-public-key --ignore-not-found=true
            kubectl -n cosign-system create secret generic cosign-public-key \
              --from-file=cosign.pub=./cosign.pub \
              --dry-run=client -o yaml | kubectl apply -f -

            # Lấy token đăng nhập động từ AWS CLI, sau đó đúc thành secret docker-registry trong EKS
            ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

            kubectl -n cosign-system delete secret ecr-registry-auth --ignore-not-found=true
            kubectl -n cosign-system create secret docker-registry ecr-registry-auth \
              --docker-server=${{ steps.login-ecr.outputs.registry }} \
              --docker-username=AWS \
              --docker-password="$ECR_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
              
            rm -f cosign.pub

        - name: Build and Push cosign verification provider image to ECR
          working-directory: ./policy/cosign-provider
          run: |
            # 🛠️ VÁ LỖI: Điền đầy đủ tham số định danh và truyền Registry động
            REGISTRY="${{ steps.login-ecr.outputs.registry }}"
            IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.POLICY_GATE }}-latest"
            
            docker build -t "$IMAGE" .
            docker push "$IMAGE"

        - name: Apply Gatekeeper policy gate
          run: |
            sed -i "s|{{ ECR_REGISTRY }}|${{ steps.login-ecr.outputs.registry }}|g" policy/gatekeeper/*.yaml
            sed -i "s|{{ ECR_REPOSITORY }}|${{ env.ECR_REPOSITORY }}|g" policy/gatekeeper/*.yaml
            sed -i "s|{{ AWS_REGION }}|${{ env.AWS_REGION }}|g" policy/gatekeeper/*.yaml
            sed -i "s|{{ CLUSTER_NAME }}|${{ env.CLUSTER_NAME }}|g" policy/gatekeeper/*.yaml
            sed -i "s|{{ K8S_NAMESPACE }}|${{ env.K8S_NAMESPACE }}|g" policy/gatekeeper/*.yaml
            
            # 1. Khởi tạo Template và Provider trước
            kubectl apply -f policy/gatekeeper/constraint-template.yaml
            kubectl apply -f policy/gatekeeper/provider.yaml
            
            # 2. Đợi Kubernetes đăng ký CRD "K8sRequiredImageSignatures"
            echo "⏳ Đợi 15 giây để Gatekeeper khởi tạo CRD..."
            sleep 15
            
            # 3. Apply kustomization cho các resource còn lại (bao gồm Constraint)
            kubectl apply -k policy/gatekeeper/
            kubectl get pods -n cosign-system
