name: 2. Build and Container Security

on:
  workflow_call:
    outputs:
      full_image_name:
        description: "The full tag of the built image"
        value: ${{ jobs.build-and-test.outputs.full_image_name }}

jobs:
  # --- DOCKER BUILD & CONTAINER SECURITY (Nhiệm vụ của Khôi) ---
  build-and-test:
    name: Build & Push Application
    # Cập nhật: Chỉ chạy khi tất cả các công cụ quét bảo mật ở trên đã hoàn thành
    # needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    # Sử dụng if: always() để đảm bảo phần Build vẫn chạy bất kể các job trước thành công hay thất bại
      

    if: always()
    runs-on: ubuntu-latest # Mượn một máy ảo Ubuntu miễn phí của GitHub để chạy
    outputs:
      full_image_name: ${{ steps.prep.outputs.IMAGE_NAME }}
      current_version: ${{ steps.prep.outputs.VERSION }}
      current_env: ${{ steps.prep.outputs.ENV }}

    # Cấp quyền để ghi vào Container Registry và ký Image (Cần thiết cho tuần 4)
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write # BẮT BUỘC: Cấp quyền đẩy file SARIF lên tab Security của GitHub

    steps:
      # Bước 1: Lấy code từ GitHub về cái máy ảo Ubuntu kia
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/NodeJS/juice-shop/package.json

      - name: Prepare Image Name & Environment
        id: prep
        run: |
          # SỬA LỖI TRỐNG BIẾN: Nếu env.ENVIRONMENT bị rỗng từ file Mẹ, tự động fallback về 'staging' để không gãy tag
          ENVIRONMENT="${{ env.ENVIRONMENT }}"
          if [ -z "$ENVIRONMENT" ]; then ENVIRONMENT="staging"; fi
          echo "ENV=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=${REPO_LOWER}" >> $GITHUB_ENV
          VERSION_TAG="${{ github.sha }}"
          IMAGE_NAME=ghcr.io/${REPO_LOWER}/juice-shop:${VERSION_TAG}-${ENVIRONMENT}
          
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Thiết lập Docker Buildx (BuildKit)
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build và Push Image
        uses: docker/build-push-action@v5
        with:
          context: app/NodeJS/juice-shop/ # Đường dẫn đến thư mục chứa Dockerfile
          push: false
          load: true 
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.REPO_LOWER }}/juice-shop:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with Syft
        # install syft and using Syft to generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json > sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report # Tên của file nén hiển thị trên giao diện GitHub
          path: sbom.spdx.json # Tên file hoặc thư mục cần lưu trữ (phải khớp với tên file xuất ra ở trên)
          retention-days: 7 # (Tùy chọn) Giữ file này trên GitHub trong 7 ngày rồi tự động xóa cho nhẹ

      # 🚀 KHÔI PHỤC: Quét Trivy xuất bản JSON
      - name: Run Trivy Vulnerability Scanner (JSON Output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "json"
          output: "trivy-report.json"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # 🚀 KHÔI PHỤC: Quét Trivy xuất bản HTML cực đẹp để báo cáo giảng viên
      - name: Run Trivy Vulnerability Scanner (HTML Output)
      
        run: |
          mkdir -p trivy-templates
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o trivy-templates/html.tpl
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/root/workspace \
            aquasec/trivy:latest image \
            --format template \
            --template "@/root/workspace/trivy-templates/html.tpl" \
            --output /root/workspace/trivy-report.html \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            ${{ env.IMAGE_NAME }}

      # 🚀 KHÔI PHỤC: Quét Trivy định dạng SARIF để đồng bộ lên Tab Security của GitHub Web
      - name: Run Trivy Vulnerability Scanner (SARIF Format)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/root/workspace \
            aquasec/trivy:latest image \
            --format sarif \
            --output /root/workspace/trivy-report.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            ${{ env.IMAGE_NAME }}

      - name: Upload Trivy SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-report.sarif

      - name: Upload Trivy Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-container-reports
          path: |
            trivy-report.json
            trivy-report.html
            trivy-report.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --yes --key cosign.key ${{ env.IMAGE_NAME }}
          rm cosign.key

      - name: Build và Push Image
        uses: docker/build-push-action@v5
        with:
          push: true 
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.REPO_LOWER }}/juice-shop:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max