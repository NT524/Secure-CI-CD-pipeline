name: 2. Build and Container Security

on:
  workflow_call:
    outputs:
      full_image_name:
        description: "The full tag of the built image"
        value: ${{ jobs.build-and-test.outputs.full_image_name }}

  workflow_dispatch: 

jobs:
  build-and-test:
    name: Build & Push Application
    # needs: [semgrep-scan, python-scan, javascript-scan, iac-scan]
    # if: always()
    runs-on: ubuntu-latest
    outputs:
      full_image_name: ${{ steps.prep.outputs.IMAGE_NAME }}
      current_version: ${{ steps.prep.outputs.VERSION }}
      current_env: ${{ steps.prep.outputs.ENV }}

    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/NodeJS/juice-shop/package.json

      - name: Prepare Image Name & Environment
        id: prep
        run: |
          # SỬA LỖI TRỐNG BIẾN: Nếu env.ENVIRONMENT bị rỗng từ file Mẹ, tự động fallback về 'staging' để không gãy tag
          ENVIRONMENT="${{ env.ENVIRONMENT }}"
          if [ -z "$ENVIRONMENT" ]; then ENVIRONMENT="staging"; fi
          echo "ENV=${ENVIRONMENT}" >> $GITHUB_OUTPUT

          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=${REPO_LOWER}" >> $GITHUB_ENV
          VERSION_TAG="${{ github.sha }}"
          IMAGE_NAME=ghcr.io/${REPO_LOWER}/juice-shop:${VERSION_TAG}-${ENVIRONMENT}

          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Thiết lập Docker Buildx (BuildKit)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: app/NodeJS/juice-shop/
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scanner (JSON Output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "json"
          output: "trivy-report.json"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # - name: Run Trivy Vulnerability Scanner (HTML Output)

      #   run: |
      #     mkdir -p trivy-templates
      #     curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o trivy-templates/html.tpl
      #     docker run --rm \
      #       -v /var/run/docker.sock:/var/run/docker.sock \
      #       -v $PWD:/root/workspace \
      #       aquasec/trivy:latest image \
      #       --format template \
      #       --template "@/root/workspace/trivy-templates/html.tpl" \
      #       --output /root/workspace/trivy-report.html \
      #       --severity CRITICAL,HIGH \
      #       --ignore-unfixed \
      #       ${{ env.IMAGE_NAME }}

      # - name: Run Trivy Vulnerability Scanner (SARIF Format)
      #   run: |
      #     docker run --rm \
      #       -v /var/run/docker.sock:/var/run/docker.sock \
      #       -v $PWD:/root/workspace \
      #       aquasec/trivy:latest image \
      #       --format sarif \
      #       --output /root/workspace/trivy-report.sarif \
      #       --severity CRITICAL,HIGH \
      #       --ignore-unfixed \
      #       ${{ env.IMAGE_NAME }}

      - name: Run security scan on deployed application
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Run security scan on deployed application
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}"
          format: "sarif"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-report.sarif

      # - name: Upload Trivy Security Reports
      #   uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #     name: trivy-container-reports
      #     path: |
      #       trivy-report.json
      #       trivy-report.html
      #       trivy-report.sarif

      

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

      - name: Generate SBOM with Syft
        # install syft and using Syft to generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json > sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.spdx.json
          retention-days: 7
      
      - name: Push Trivy Report to Grafana Loki
        if: always() # Đảm bảo log luôn được gửi kể cả khi Trivy tìm thấy lỗi
        run: |
          TIMESTAMP=$(date +%s%N)
          LOG_CONTENT=$(cat trivy-results.json | jq -c .)
          
          curl -H "Content-Type: application/json" \
               -u "${{ secrets.LOKI_AUTH }}" \
               -X POST "${{ secrets.LOKI_URL }}" \
               -d "{\"streams\": [{\"stream\": {\"job\": \"github-actions\", \"scan_type\": \"trivy-container-scan\", \"image\": \"${{ env.IMAGE_NAME }}\", \"repo\": \"${{ github.repository }}\"}, \"values\": [[\"$TIMESTAMP\", $LOG_CONTENT]]}]}"

      - name: Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --yes --key cosign.key ${{ env.IMAGE_NAME }}
          rm cosign.key
