name: Infrastructure Deploy and Gatekeeper

on:
#   pull_request:
#     types:
#     - closed
#     paths-ignore:
#     - 'VERSION'
#     branches:
#     - dev
#   push:
#     branches:
#     - prod
#     - dev
#     - staging
#     paths-ignore:
#     - 'VERSION'
#     - 'README.md'
  workflow_dispatch:

  workflow_call:
    inputs:
      full_image_name:
        required: true
        type: string


permissions:
  contents: write
  id-token: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  K8S_NAMESPACE: isolated-staging
  NODE_VERSION: 24
  AWS_REGION: us-east-1
  ENVIRONMENT: staging
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_REGION: ${{ secrets.S3_REGION }}
  DYNAMODB_TABLE: ${{ secrets.DYNAMODB_TABLE }}
  cluster_name: juice-shop-cluster
  IMAGE_NAME: ${{ inputs.full_image_name }}

jobs:
  Deploy-to-eks:
    name: Provision & Deploy to Amazon EKS
    runs-on: ubuntu-latest
    outputs:
      URL: ${{ steps.verify.outputs.URL }}

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Nạp AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI v2
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Install Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Ansible and Kubernetes dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible boto3 botocore kubernetes 

      - name: Install Ansible Collections
        run: |
          mkdir -p ansible/collections
          ansible-galaxy collection install amazon.aws kubernetes.core -p ansible/collections
      
      - name: Bootstrap Terraform Backend (S3 & DynamoDB)
        run: |
          echo "=== 1. Kiểm tra S3 Bucket: ${{ env.S3_BUCKET }} ==="
          if aws s3api head-bucket --bucket "${{ env.S3_BUCKET }}" 2>/dev/null; then
            echo "✅ S3 Bucket đã tồn tại."
          else
            echo "⏳ S3 Bucket chưa có. Đang tiến hành tạo mới..."
            if [ "${{ env.AWS_REGION }}" == "us-east-1" ]; then
              aws s3api create-bucket --bucket "${{ env.S3_BUCKET }}" --region "${{ env.AWS_REGION }}"
            else
              aws s3api create-bucket --bucket "${{ env.S3_BUCKET }}" --region "${{ env.AWS_REGION }}" --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
            fi
            aws s3api put-bucket-versioning --bucket "${{ env.S3_BUCKET }}" --versioning-configuration Status=Enabled
          fi

          echo "=== 2. Kiểm tra DynamoDB Table: ${{ env.DYNAMODB_TABLE }} ==="
          if aws dynamodb describe-table --table-name "${{ env.DYNAMODB_TABLE }}" 2>/dev/null; then
            echo "✅ DynamoDB Table đã tồn tại."
          else
            echo "⏳ DynamoDB Table chưa có. Đang tiến hành tạo mới..."
            aws dynamodb create-table \
              --table-name "${{ env.DYNAMODB_TABLE }}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${{ env.AWS_REGION }}"
            aws dynamodb wait table-exists --table-name "${{ env.DYNAMODB_TABLE }}" --region "${{ env.AWS_REGION }}"
          fi

      - name: Clean up Terraform Lock (Nếu có)
        run: |
          aws dynamodb delete-item \
            --table-name "${{ env.DYNAMODB_TABLE }}" \
            --key '{"LockID": {"S": "${{ env.S3_BUCKET }}/state/${{ env.ENVIRONMENT }}.tfstate"}}' \
            --region "${{ env.AWS_REGION }}" || echo "No active lock found."
      
      - name: Set up Environment Variables
        run: |
          echo "TF_VAR_AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "TF_VAR_AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "TF_VAR_aws_region=${{ env.AWS_REGION }}" >> $GITHUB_ENV
          echo "TF_VAR_cluster_name=${{ env.cluster_name }}" >> $GITHUB_ENV
          echo "TF_VAR_environment=${{ env.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "TF_VAR_ARN_IAM_USER=${{ secrets.ARN_IAM_USER }}" >> $GITHUB_ENV
          echo "TF_VAR_ARN_POLICY=${{ secrets.ARN_POLICY }}" >> $GITHUB_ENV
          echo "TF_VAR_IMAGE_NAME=${{ inputs.full_image_name }}" >> $GITHUB_ENV
          echo "TF_VAR_K8S_NAMESPACE=${{ env.K8S_NAMESPACE }}" >> $GITHUB_ENV
          echo "TF_VAR_GITHUB_TOKEN=${{ secrets.GHCR_PAT }}" >> $GITHUB_ENV
          echo "TF_VAR_GITHUB_ACTOR=${{ github.actor }}" >> $GITHUB_ENV
          echo "TF_IN_AUTOMATION=1" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=state/${{ env.ENVIRONMENT }}.tfstate" \
            -backend-config="region=${{ env.S3_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.DYNAMODB_TABLE }}"

      - name: Terraform Refresh State
        working-directory: terraform
        run: terraform refresh

      - name: Terraform Plan EKS
        id: tf-plan-eks
        working-directory: terraform
        run: |
          export exitcode=0
          terraform plan -detailed-exitcode -no-color -out tfplan
          export exitcode=$?
          
          if [ $exitcode -eq 1 ]; then
            echo "Terraform Plan Failed!"
            exit 1
          elif [ $exitcode -eq 2 ]; then
            echo "Drift detected. Need to run terraform apply"
            echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
            exit 0
          else 
            echo "No changes. Infrastructure is up-to-date."
            echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Terraform Apply Infrastructure
        working-directory: terraform
        if: ${{ steps.tf-plan-eks.outputs.exitcode == '2' || steps.tf-plan-eks.outputs.exitcode == '0' }}
        run: |
            terraform apply -auto-approve
            kubectl get pods -n ${{ env.K8S_NAMESPACE }}

      - name: Verify deployment
        id: verify
        run: |
          # kubectl rollout status deployment/juice-shop -n ${{env.K8S_NAMESPACE}} --timeout=120s
          RAW_URL="$(kubectl get svc juice-shop-service -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')"
          
          # Tự động thay thế chuỗi che khuất "***" bằng chính region đang chạy trong env
          URL="http://$(echo "$RAW_URL" | sed "s/\*\*\*/${{ env.AWS_REGION }}/g")"
          
          echo "$URL" 
          echo "URL=$URL" >> $GITHUB_OUTPUT