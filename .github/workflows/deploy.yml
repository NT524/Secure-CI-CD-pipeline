name: Infrastructure Deploy and Gatekeeper

on:
  workflow_call:
    inputs:
      full_image_name:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  K8S_NAMESPACE: isolated-staging
  NODE_VERSION: 24
  AWS_REGION: us-east-1
  ENVIRONMENT: staging
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_REGION: ${{ secrets.S3_REGION }}
  DYNAMODB_TABLE: ${{ secrets.DYNAMODB_TABLE }}
  cluster_name: juice-shop-cluster

jobs:
  Deploy-to-eks:
    name: Provision & Deploy to Amazon EKS
    runs-on: ubuntu-latest
    outputs:
      URL: ${{ steps.verify.outputs.URL }}

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4
      
      - name: Thiết lập Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Nạp AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI v2
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Install Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Ansible and Kubernetes dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible boto3 botocore kubernetes 

      - name: Install Ansible Collections
        run: |
          mkdir -p ansible/collections
          ansible-galaxy collection install amazon.aws kubernetes.core -p ansible/collections
      
      - name: Bootstrap Terraform Backend (S3 & DynamoDB)
        run: |
          echo "=== 1. Kiểm tra S3 Bucket: ${{ env.S3_BUCKET }} ==="
          if aws s3api head-bucket --bucket "${{ env.S3_BUCKET }}" 2>/dev/null; then
            echo "✅ S3 Bucket đã tồn tại."
          else
            echo "⏳ S3 Bucket chưa có. Đang tiến hành tạo mới..."
            if [ "${{ env.AWS_REGION }}" == "us-east-1" ]; then
              aws s3api create-bucket --bucket "${{ env.S3_BUCKET }}" --region "${{ env.AWS_REGION }}"
            else
              aws s3api create-bucket --bucket "${{ env.S3_BUCKET }}" --region "${{ env.AWS_REGION }}" --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
            fi
            aws s3api put-bucket-versioning --bucket "${{ env.S3_BUCKET }}" --versioning-configuration Status=Enabled
          fi

          echo "=== 2. Kiểm tra DynamoDB Table: ${{ env.DYNAMODB_TABLE }} ==="
          if aws dynamodb describe-table --table-name "${{ env.DYNAMODB_TABLE }}" 2>/dev/null; then
            echo "✅ DynamoDB Table đã tồn tại."
          else
            echo "⏳ DynamoDB Table chưa có. Đang tiến hành tạo mới..."
            aws dynamodb create-table \
              --table-name "${{ env.DYNAMODB_TABLE }}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${{ env.AWS_REGION }}"
            aws dynamodb wait table-exists --table-name "${{ env.DYNAMODB_TABLE }}" --region "${{ env.AWS_REGION }}"
          fi

      - name: Clean up Terraform Lock (Nếu có)
        run: |
          aws dynamodb delete-item \
            --table-name "${{ env.DYNAMODB_TABLE }}" \
            --key '{"LockID": {"S": "${{ env.S3_BUCKET }}/state/${{ env.ENVIRONMENT }}.tfstate"}}' \
            --region "${{ env.AWS_REGION }}" || echo "No active lock found."
      
      - name: Set up Environment Variables
        run: |
          echo "TF_VAR_AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "TF_VAR_AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "TF_VAR_aws_region=${{ env.AWS_REGION }}" >> $GITHUB_ENV
          echo "TF_VAR_cluster_name=${{ env.cluster_name }}" >> $GITHUB_ENV
          echo "TF_VAR_environment=${{ env.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "TF_VAR_ARN_IAM_USER=${{ secrets.ARN_IAM_USER }}" >> $GITHUB_ENV
          echo "TF_VAR_ARN_POLICY=${{ secrets.ARN_POLICY }}" >> $GITHUB_ENV
          echo "TF_VAR_IMAGE_NAME=${{ inputs.full_image_name }}" >> $GITHUB_ENV
          echo "TF_VAR_K8S_NAMESPACE=${{ env.K8S_NAMESPACE }}" >> $GITHUB_ENV
          echo "TF_VAR_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "TF_VAR_GITHUB_ACTOR=${{ github.actor }}" >> $GITHUB_ENV
          echo "TF_IN_AUTOMATION=1" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=state/${{ env.ENVIRONMENT }}.tfstate" \
            -backend-config="region=${{ env.S3_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.DYNAMODB_TABLE }}"

      - name: Terraform Refresh State
        working-directory: terraform
        run: terraform refresh

      - name: Terraform Plan EKS
        id: tf-plan-eks
        working-directory: terraform
        run: |
          export exitcode=0
          terraform plan -detailed-exitcode -no-color -out tfplan
          export exitcode=$?
          
          if [ $exitcode -eq 1 ]; then
            echo "Terraform Plan Failed!"
            exit 1
          elif [ $exitcode -eq 2 ]; then
            echo "Drift detected. Need to run terraform apply"
            echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
            exit 0
          else 
            echo "No changes. Infrastructure is up-to-date."
            echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
            exit 0
          fi

      # --- BẮT ĐẦU PHẦN CONFTEST CHO HẠ TẦNG AWS ---
      - name: Setup Conftest
        if: ${{ steps.tf-plan-eks.outputs.exitcode != '1' }}
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar -xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Terraform Plan & Run Conftest Policy Scan
        working-directory: terraform
        if: ${{ steps.tf-plan-eks.outputs.exitcode != '1' }}
        run: |
          terraform show -json tfplan > tfplan.json
          conftest test tfplan.json --policy ../policy/conftest/ -o json > conftest-report.json || true
          conftest test tfplan.json --policy ../policy/conftest/ -o html > conftest-report.html || true
          conftest test tfplan.json --policy ../policy/conftest/

      - name: Upload Conftest Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-infrastructure-reports
          path: |
            terraform/conftest-report.json
            terraform/conftest-report.html
      # --- KẾT THÚC PHẦN CONFTEST ---

      # CẤU HÌNH ĐƯỜNG TRUYỀN KUBECTL ĐẾN CỤM AWS EKS
      - name: Update Kubeconfig cho AWS EKS
        run: aws eks update-kubeconfig --name ${{ env.cluster_name }}-${{ env.ENVIRONMENT }} --region ${{ env.AWS_REGION }}

      # TRIỂN KHAI TOÀN BỘ CHỐT KIỂM SOÁT OPA GATEKEEPER
      - name: Install Gatekeeper with external data enabled
        run: |
          kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper/release-3.10/deploy/gatekeeper.yaml
          kubectl -n gatekeeper-system patch deployment gatekeeper-controller-manager --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-external-data"}]'
          kubectl -n gatekeeper-system patch deployment gatekeeper-audit --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-external-data"}]'
          kubectl -n gatekeeper-system rollout status deployment/gatekeeper-controller-manager --timeout=180s
          kubectl -n gatekeeper-system rollout status deployment/gatekeeper-audit --timeout=180s
          
          echo "⏳ Đợi 20 giây để Gatekeeper Webhook khởi động mạng hoàn tất..."
          sleep 20
          
      - name: Sync Cosign public key and registry auth into cluster
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          kubectl create namespace cosign-system --dry-run=client -o yaml | kubectl apply -f -
          printf '%s\n' "$COSIGN_PUBLIC_KEY" > cosign.pub
          kubectl -n cosign-system create secret generic cosign-public-key \
            --from-file=cosign.pub=./cosign.pub \
            --dry-run=client -o yaml | kubectl apply -f -
          AUTH=$(printf '%s:%s' "$GHCR_USERNAME" "$GHCR_PAT" | base64 -w0)
          cat > config.json <<EOF
          {"auths":{"ghcr.io":{"auth":"$AUTH"}}}
          EOF
          kubectl -n cosign-system create secret generic ghcr-registry-auth \
            --from-file=config.json=./config.json \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f cosign.pub
          rm -f config.json

      - name: Log in to GitHub Container Registry for Provider
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push cosign verification provider image to GHCR
        run: |
          docker build -t ghcr.io/nt524/secure-ci-cd-pipeline/cosign-gatekeeper-provider:latest policy/cosign-provider
          docker push ghcr.io/nt524/secure-ci-cd-pipeline/cosign-gatekeeper-provider:latest

      - name: Apply Gatekeeper policy gate
        run: |
          echo "🧹 THÊM BƯỚC NÀY: Dọn sạch luật chặn cũ để giải phóng cụm, tránh lỗi tự chặn chính mình (Deadlock)"
          kubectl delete -f policy/gatekeeper/constraint.yaml --ignore-not-found=true
          kubectl delete -f policy/gatekeeper/constraint-template.yaml --ignore-not-found=true

          echo "🚀 Tiến hành deploy Pod Provider mới..."
          kubectl apply -f policy/gatekeeper/provider-deployment.yaml
          kubectl apply -f policy/gatekeeper/provider.yaml
          
          echo "⏳ ĐỢI 45 GIÂY để Pod Provider mới chính thức lên đĩa và mở cổng 8090..."
          sleep 45

          echo "=== Kiểm tra trạng thái Pod Provider ==="
          kubectl get pods -n cosign-system

          echo "🔒 Tái áp dụng luật chặn bảo mật sau khi lính gác đã sống dậy chuẩn chỉ"
          kubectl apply -f policy/gatekeeper/constraint-template.yaml
          for i in $(seq 1 30); do
            if kubectl get crd k8srequiredimagesignatures.constraints.gatekeeper.sh >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          kubectl apply -f policy/gatekeeper/constraint.yaml
          
          echo "⏳ Đợi 15 giây để luật kiểm duyệt đồng bộ vào nhân Gatekeeper..."
          sleep 15

      # TIẾN HÀNH ĐẨY APP KHI HỆ THỐNG GÁC CỔNG ĐÃ THÔNG SUỐT MẠNG
      - name: Terraform Apply Plan (Provision EKS)
        working-directory: terraform
        if: ${{ steps.tf-plan-eks.outputs.exitcode == '2'}} 
        run: terraform apply tfplan

      - name: Terraform Apply  (Provision EKS)
        working-directory: terraform
        if: ${{ steps.tf-plan-eks.outputs.exitcode == '0'}} 
        run: | 
          terraform apply -auto-approve
          kubectl get pods -n isolated-staging

      - name: Verify deployment
        id: verify
        run: |
          kubectl rollout status deployment/juice-shop -n ${{env.K8S_NAMESPACE}} --timeout=120s
          URL="http://$(kubectl get svc juice-shop-service -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')"
          echo "$URL" 
          echo "URL=$URL" >> $GITHUB_OUTPUT