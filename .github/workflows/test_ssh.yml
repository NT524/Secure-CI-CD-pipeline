name: 🧪 Test Isolation - SSH Remote Deploy

# Cấu hình trigger thủ công: Giúp em có thể chủ động bấm nút "Run workflow" trên giao diện GitHub Actions để test đi test lại
on:
  workflow_dispatch:

jobs:
  deploy-app-k3s:
    name: 5. Deploy Manifests to K3s Cluster
    runs-on: ubuntu-latest

    outputs:
      staging_url: http://${{ needs.provision-infrastructure.outputs.staging_public_ip }}

    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Kiểm tra trạng thái thông mạch cổng SSH (22) trên AWS
        run: |
          TARGET_IP="${{ needs.provision-infrastructure.outputs.staging_public_ip }}"
          echo "🔍 Đang thăm dò kết nối tới địa chỉ AWS: ${TARGET_IP}..."
          for i in {1..12}; do
            if nc -zv -w 3 $TARGET_IP 22; then
              echo "✅ [SUCCESS] Cổng SSH đã mở hoàn toàn! Sẵn sàng bàn giao cho Runner deploy."
              exit 0
            fi
            echo "⏳ Cổng SSH (22) phản hồi từ chối. Server đang load OS, chờ 5 giây (Lần thử $i/12)..."
            sleep 5
          done
          exit 1

      - name: 3. Deploy Kubernetes Manifests via SSH Remote
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.build-and-test.outputs.full_image_name }}
        with:
          host: ${{ needs.provision-infrastructure.outputs.staging_public_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          envs: APP_IMAGE
          script_stop: true # 🌟 ÉP BUỘC GÃY ĐỂ ĐÈ BUG: Báo đỏ ngay nếu lệnh nào trong script bị lỗi
          script: |
            echo "=== [BƯỚC 1] KHỞI ĐỘNG HỆ THỐNG K3S ==="
            echo "🚚 Docker Image đích: $APP_IMAGE"

            # Cấu hình cứng đường dẫn Kubeconfig để kubectl kết nối chuẩn xác vào cụm K3s
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "🤖 Chờ hệ thống K3s API sẵn sàng hoạt động..."
            for i in {1..15}; do
              if sudo kubectl get nodes > /dev/null 2>&1; then
                echo "✅ Hệ thống K3s core đã Online!"
                break
              fi
              echo "⏳ Đang đợi API Server của K3s khởi tạo cấu hình (Lần thử $i/15)..."
              sleep 5
            done

            # Kiểm tra và bọc lót tạo luôn Namespace đề phòng hạ tầng Terraform cũ chưa có
            echo "🏢 Kiểm tra không gian tên (Namespace) staging..."
            sudo kubectl create namespace nodegoat-staging || true

            echo "=== [BƯỚC 2] TẢI MÃ NGUỒN MANIFESTS ==="
            rm -rf app

            echo "📥 Tiến hành clone bản sạch trực tiếp từ nhánh testing_aws..."
            # Sửa lỗi chính tả tên Repo hoa/thường: NT524/Secure-CI-CD-pipeline
            git clone https://github.com/NT524/Secure-CI-CD-pipeline.git -b testing_aws app

            cd app

            echo "=== [BƯỚC 3] TRIỂN KHAI DATABASE MONGODB ==="
            sudo kubectl apply -f k8s/mongodb_deployment.yaml
            sudo kubectl apply -f k8s/mongodb_service.yaml

            echo "=== [BƯỚC 4] CẤU HÌNH VÀ TRIỂN KHAI APP NODEGOAT ==="
            echo "🔧 Đang thực hiện thay thế token image động vào file deployment..."
            sed -i "s|\${app_image}|$APP_IMAGE|g" k8s/nodegoat_deployment.yaml

            echo "🔍 Kiểm tra nội dung file sau khi cập nhật image tag:"
            grep -A 2 -B 2 "image:" k8s/nodegoat_deployment.yaml

            sudo kubectl apply -f k8s/nodegoat_deployment.yaml
            sudo kubectl apply -f k8s/nodegoat_service.yaml

            echo "=== [BƯỚC 5] CẬP NHẬT NÓNG VÀ KIỂM TRA TRẠNG THÁI POD ==="
            sudo kubectl rollout restart deployment/nodegoat-app -n nodegoat-staging || true

            echo "📊 Đang chờ các Pod trên Kubernetes Cluster chuyển sang trạng thái Running..."
            sudo kubectl rollout status deployment/mongodb -n nodegoat-staging --timeout=60s
            sudo kubectl rollout status deployment/nodegoat-app -n nodegoat-staging --timeout=90s

            echo "🎉 [SUCCESS] Hệ thống kết hợp IaC và CI/CD đã chạy thành công tuyệt đối!"
