name: 🧪 Test Isolation - SSH Remote Deploy

# Cấu hình trigger thủ công: Giúp em có thể chủ động bấm nút "Run workflow" trên giao diện GitHub Actions để test đi test lại
on:
  workflow_dispatch: 

jobs:
  test-ssh-deployment:
    name: Test SSH Action and K3s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: 1. Kiểm tra kết nối mạng cơ bản tới AWS EC2
        run: |
          echo "🔍 Đang kiểm tra phản hồi cổng 22 của máy chủ 13.220.63.189..."
          if nc -zv -w 5 13.220.63.189 22; then
            echo "✅ Cổng 22 đang MỞ. Máy chủ AWS sẵn sàng nhận kết nối SSH."
          else
            echo "❌ Cổng 22 đang ĐÓNG hoặc bị Security Group chặn! Vui lòng kiểm tra lại hạ tầng."
            exit 1
          fi

      - name: 2. Thực thi Deploy Thử nghiệm qua SSH Remote
        uses: appleboy/ssh-action@v1.0.3
        # 🌟 KHẮC PHỤC LỖI TRUYỀN BIẾT: Đưa các biến host, username, key ra ngoài block env: 
        # block env chỉ dành cho các biến môi trường nội bộ muốn truyền vào Script.
        with:
          host: 13.220.63.189
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          envs: APP_IMAGE
          script_stop: true # Bật tính năng dừng ngay lập tức nếu bất kỳ dòng lệnh Bash nào bên dưới bị lỗi để dễ debug
          script: |
            echo "=== [BƯỚC 1] KHỞI ĐỘNG HỆ THỐNG K3S ==="
            export APP_IMAGE="ghcr.io/nt524/secure-ci-cd-pipeline/nodegoat:f962aa8e666629b944d066ad1c5c82f63f4490fb"
            echo "🚚 Docker Image đích: $APP_IMAGE"
            
            echo "🤖 Chờ hệ thống K3s sẵn sàng..."
            until sudo kubectl get nodes; do sleep 3; done
            
            echo "=== [BƯỚC 2] ĐỒNG BỘ MÃ NGUỒN MANIFESTS ==="
            # Quản lý và dọn rác thư mục app cũ nếu có để tránh xung đột git clone
            if [ -d "app" ]; then
              echo "🧹 Phát hiện thư mục cũ, tiến hành cập nhật code mới nhất..."
              cd app
              sudo git config --global --add safe.directory $(pwd)
              sudo git fetch --all
              sudo git reset --hard origin/main || sudo git reset --hard origin/master
            else
              echo "📥 Thư mục trống, tiến hành clone kho lưu trữ từ GitHub..."
              # Thay thế chính xác bằng tên repo thật của em để chạy độc lập không phụ thuộc ngữ cảnh pipeline
              sudo git clone https://github.com/NT524/Secure-CI-CD-pipeline.git app
              cd app
            fi
            
            echo "=== [BƯỚC 3] TRIỂN KHAI DATABASE MONGODB ==="
            sudo kubectl apply -f k8s/mongodb_namespace.yaml
            sudo kubectl apply -f k8s/mongodb_deployment.yaml
            sudo kubectl apply -f k8s/mongodb_service.yaml
            
            echo "=== [BƯỚC 4] CẤU HÌNH VÀ TRIỂN KHAI APP NODEGOAT ==="
            echo "🔧 Đang thực hiện thay thế token image động vào file deployment..."
            sudo sed -i "s|\${app_image}|$APP_IMAGE|g" k8s/nodegoat_deployment.yaml
            
            # In ra log 15 dòng đầu để kiểm tra xem lệnh sed đã thay thế chuỗi ${app_image} thành công chưa
            echo "🔍 Kiểm tra nội dung file sau khi sed:"
            grep -A 2 -B 2 "image:" k8s/nodegoat_deployment.yaml
            
            sudo kubectl apply -f k8s/nodegoat_deployment.yaml
            sudo kubectl apply -f k8s/nodegoat_service.yaml
            
            echo "=== [BƯỚC 5] CẬP NHẬT NÓNG VÀ KIỂM TRA TRẠNG THÁI POD ==="
            sudo kubectl rollout restart deployment/nodegoat-app -n nodegoat-staging || true
            
            echo "📊 Đang chờ các Pod trên Kubernetes Cluster chuyển sang trạng thái Running..."
            sudo kubectl rollout status deployment/mongodb -n nodegoat-data --timeout=60s
            sudo kubectl rollout status deployment/nodegoat-app -n nodegoat-staging --timeout=90s
            
            echo "🎉 [SUCCESS] Chúc mừng Khôi! Module SSH Deployment đã chạy thành công tuyệt đối!"
