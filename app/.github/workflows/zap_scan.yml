  dast_scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    # Cấp quyền để GitHub Actions có thể tạo Issue
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Chạy OWASP ZAP Baseline Scan
        uses: zaproxy/action-full-scan@v0.13.0 # (Kiểm tra version mới nhất)
        with:
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'https://preview.owasp-juice.shop'
          rules_file_name: ".zap/rules.tsv" # File cấu hình rules tùy chỉnh nếu có
          # TỰ ĐỘNG TẠO ISSUE KÈM CONTEXT
          issue_title: '🚨 DAST Alert: Security vulnerability discovered on Staging'
          
          # FAIL PIPELINE NẾU CÓ LỖI (CHẶN PROMOTION)
          fail_action: true 
          
          # Cho phép ZAP scan tối đa x phút để tránh treo pipeline
          cmd_options: '-a -m 5' 
          artifact_name: 'zap-scan-report'

      - name: Lưu trữ báo cáo (Gather Findings)
        if: always() # Luôn chạy bước này dù scan pass hay fail
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report-html-only
          path: report_html.html
