repos:
  # 1. UNIVERSAL SECRET SCANNING (Extremely fast, blocks secrets at the gate)
  - repo: https://github.com/gitleaks/gitleaks
    rev: 'v8.30.0'
    hooks:
      - id: gitleaks
        description: Prevent developers from accidentally committing passwords and API keys to Git.

  # 2. IaC / TERRAFORM SECURITY SCAN (For infrastructure source code)
  - repo: https://github.com/aquasecurity/tfsec
    rev: 'v1.28.14'
    hooks:
      - id: tfsec
        args: ['--minimum-severity=MEDIUM'] # Ignore LOW severity issues to prevent developer alert fatigue
        description: Scan for security misconfigurations in Terraform files (AWS, GCP, Azure).

  # 3. ULTRA-FAST STATIC ANALYSIS (SAST) WITH SEMGREP
  - repo: https://github.com/returntocorp/semgrep
    rev: 'v1.151.0'
    hooks:
      - id: semgrep
        name: semgrep
        description: Scan for security vulnerabilities in source code.
        # Use specific high-quality rulesets (low false positives) instead of a full scan
        args:
          - --config=p/javascript
          - --config=p/nodejs
          - --config=p/owasp-top-ten
          - --error # Force pre-commit to fail and block the commit if vulnerabilities are found

  # 4. LINTERS & CODE QUALITY (Tailored for NodeGoat)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 'v10.1.0'
    hooks:
      - id: eslint
        files: \.[jt]sx?$  # Only scan JavaScript/TypeScript files
        types: [file]
        args: ['--max-warnings=0'] # Treat all warnings as errors to enforce strict linting
        additional_dependencies:
          - eslint
          - eslint-plugin-security # Inject security rules into the standard ESLint process

  # 5. BASIC CODE HYGIENE (Fast feedback for common formatting issues)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v6.0.0'
    hooks:
      - id: check-added-large-files        # Prevent committing giant files/binaries
      - id: check-ast                      # Check whether files parse as valid Python
      - id: check-case-conflict            # Check for files with names that would conflict on case-insensitive filesystems
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-json                     # Validate JSON syntax
        exclude: ".devcontainer/devcontainer.json"
      - id: check-merge-conflict           # Block commits containing unresolved merge conflict markers
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
        exclude: "^(bin|test|libs/testo/.*test|src/spacegrep/bin/.*)$"
      - id: check-toml                     # Validate TOML syntax
      - id: check-vcs-permalinks
      - id: check-xml                      # Validate XML syntax
      - id: check-yaml                     # Validate YAML syntax
        args: [--allow-multiple-documents]
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key             # Secondary check for exposed private keys (e.g., RSA)
      - id: end-of-file-fixer              # Ensure every file ends with a single newline character
        # Exclude generated files.
        # coupling: apply the same exclusions in semgrep-proprietary
        exclude: "^\\.github/workflows/.+|semgrep\\.opam|opam-lockfiles/.+|.gitmodules|.dockerignore$"
      - id: fix-byte-order-marker
      - id: fix-encoding-pragma
        args: [--remove]
      - id: mixed-line-ending              # Normalize mixed line endings
        args: [--fix=lf]
        exclude: "libs/testo/tests/snapshots"
      - id: no-commit-to-branch            # Prevent direct commits to restricted branches (like main/master)
      - id: requirements-txt-fixer
      - id: trailing-whitespace            # Automatically trim invisible trailing spaces
        args: [--markdown-linebreak-ext=md]
        exclude: "snapshots"
