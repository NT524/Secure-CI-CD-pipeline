apiVersion: v1
kind: Namespace
metadata:
  name: cosign-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosign-gatekeeper-provider
  namespace: cosign-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosign-gatekeeper-provider
  template:
    metadata:
      labels:
        app: cosign-gatekeeper-provider
    spec:
      containers:
        - name: cosign-gatekeeper-provider
          image: local/cosign-gatekeeper-provider:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: cosign-key
              mountPath: /keys
              readOnly: true
            - name: registry-auth
              mountPath: /root/.docker
              readOnly: true
      volumes:
        - name: cosign-key
          secret:
            secretName: cosign-public-key
        - name: registry-auth
          secret:
            secretName: ghcr-registry-auth
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: cosign-gatekeeper-provider
  namespace: cosign-system
spec:
  selector:
    app: cosign-gatekeeper-provider
  ports:
    - port: 8090
      targetPort: 8090
