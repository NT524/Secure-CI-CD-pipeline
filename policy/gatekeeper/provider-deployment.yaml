apiVersion: v1
kind: Namespace
metadata:
  name: cosign-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosign-gatekeeper-provider
  namespace: cosign-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosign-gatekeeper-provider
  template:
    metadata:
      labels:
        app: cosign-gatekeeper-provider
    spec:
      imagePullSecrets:
      - name: ecr-registry-auth
      containers:
      - name: cosign-gatekeeper-provider
        image: "{{ ECR_REGISTRY }}/{{ ECR_REPOSITORY }}/cosign-gatekeeper-provider:latest"
        imagePullPolicy: Always
        ports:
        - containerPort: 8090
        env:
        - name: AWS_REGION
          value: "{{ AWS_REGION }}"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-key
        volumeMounts:
        - name: cosign-key
          mountPath: /keys
          readOnly: true
      volumes:
      - name: cosign-key
        secret:
          secretName: cosign-public-key
      # 🛠️ ĐÃ SỬA: Ánh xạ chuẩn từ định dạng K8s (.dockerconfigjson) sang file config.json truyền thống
      - name: registry-auth
        secret:
          secretName: ecr-registry-auth
          items:
          - key: .dockerconfigjson
            path: config.json
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: cosign-gatekeeper-provider
  namespace: cosign-system
spec:
  selector:
    app: cosign-gatekeeper-provider
  ports:
  - port: 8090
    targetPort: 8090
