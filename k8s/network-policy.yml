apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-from-other-namespaces
  namespace: isolated-staging
spec:
  podSelector: {} # Áp dụng cho TẤT CẢ các pod trong namespace này
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {} # Chỉ cho phép các Pod nội bộ trong namespace này gọi nhau
    # Nếu muốn nhận traffic từ Load Balancer/Ingress, cần cấu hình thêm tùy theo loại Ingress Controller bạn dùng
