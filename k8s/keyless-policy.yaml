apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-signed-project-images
spec:
  images:
    - glob: "ghcr.io/nt524/secure-ci-cd-pipeline/nodegoat*"
  
  # --- CHỐT CHẶN 1: XÁC THỰC DANH TÍNH KÝ KEYLESS OIDC ---
  authorities:
    - keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - issuer: https://token.actions.githubusercontent.com
            subject:
              type: regex
              val: "https://github.com/NT524/.*"
  
  # Đưa importSecrets ra ngang hàng trong authorities theo đúng spec mới của policy-controller
  importSecrets:
    - name: ghcr-registry-auth

  # --- CHỐT CHẶN 2: ÉP BUỘC ĐÍNH KÈM CHỨNG THỰC BÁO CÁO SBOM ---
  policy:
    type: configmap
    data:
      name: sbom-verification-policy
      namespace: cosign-system

---
# Định nghĩa luật kiểm tra định dạng dữ liệu của file SBOM đi kèm bằng Rego
apiVersion: v1
kind: ConfigMap
metadata:
  name: sbom-verification-policy
  namespace: cosign-system
data:
  policy.rego: |
    package sigstore
    default allow = false
    allow {
      input.attestations[_].predicateType == "https://spdx.dev/Document"
    }