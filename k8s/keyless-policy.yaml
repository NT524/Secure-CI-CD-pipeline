# --- BỘ LUẬT 1: CHECK KEYLESS VÀ SBOM CHO NODEGOAT (KHO PRIVATE) ---
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-signed-project-images
spec:
  images:
    - glob: "ghcr.io/nt524/secure-ci-cd-pipeline/nodegoat*"
  authorities:
    - keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - issuer: https://token.actions.githubusercontent.com
            subjectRegExp: "https://github.com/NT524/.*"
      
      attestations:
        - name: check-sbom-attachment
          predicateType: https://spdx.dev/Document
          policy:
            type: rego
            data: |
              package sigstore
              default allow = false
              allow {
                input.predicate != null
              }
  
  #  Đưa importSecrets ra ngoài, nằm ngang hàng với mảng authorities
  importSecrets:
    - name: ghcr-registry-auth

---
# --- BỘ LUẬT 2: CHO PHÉP MONGODB QUA CỬA KHÔNG CẦN KIỂM TRA ---
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: allow-public-images
spec:
  images:
    - glob: "index.docker.io/library/mongo*"
    - glob: "docker.io/library/mongo*"
  authorities:
    - static:
        action: pass