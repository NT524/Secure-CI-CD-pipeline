apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-signed-project-images
spec:
  images:
    - glob: "ghcr.io/nt524/secure-ci-cd-pipeline/nodegoat*"
  authorities:
    - keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - issuer: https://token.actions.githubusercontent.com
            # 1. Đã sửa: Chữ E phải viết hoa
            subjectRegExp: "https://github.com/NT524/.*"
      
      # 2. Đã xóa bỏ hoàn toàn khối importSecrets
      
      attestations:
        - name: check-sbom-attachment
          # Đổi predicateType thành chuẩn URI định dạng của SBOM
          predicateType: https://spdx.dev/Document
          policy:
            type: rego
            # 3. Đã sửa: Nhúng trực tiếp code Rego vào đây, không dùng ConfigMap
            data: |
              package sigstore
              default allow = false
              allow {
                input.predicateType == "https://spdx.dev/Document"
              }